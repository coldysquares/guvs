<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation — family map</title>
<style>
  :root{
    --bg:#0d0f14; --panel:#151a23; --line:#222a37; --ink:#e7ecf3;
    --muted:#8a97ab; --accent:#6ea8fe; --accent2:#ffd479;
    --g0:#6ea8fe; --g1:#7ee0c9; --g2:#ffd479; --g3:#ff9aa2; --g4:#c8a8ff;
    --rel-parent:#3f5d8a; --rel-spouse:#b9893f; --rel-half:#8a5cc0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  #app{display:grid;grid-template-columns:1fr 320px;grid-template-rows:56px 1fr;height:100%}
  header{grid-column:1/3;display:flex;align-items:center;gap:14px;padding:0 16px;
    border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{font-size:15px;margin:0;letter-spacing:.3px;font-weight:600}
  header h1 span{color:var(--accent)}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);
    padding:2px 8px;border-radius:20px}
  #search{margin-left:auto;background:#0c1018;border:1px solid var(--line);
    color:var(--ink);padding:8px 12px;border-radius:8px;width:220px;outline:none}
  #search:focus{border-color:var(--accent)}
  .btn{background:#0c1018;border:1px solid var(--line);color:var(--muted);
    padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px}
  .btn:hover{color:var(--ink);border-color:var(--accent)}
  #stage{position:relative;overflow:hidden}
  canvas{display:block;width:100%;height:100%;cursor:grab}
  canvas.drag{cursor:grabbing}
  aside{background:var(--panel);border-left:1px solid var(--line);
    padding:18px;overflow:auto}
  .empty{color:var(--muted);font-size:13px;margin-top:8px}
  .person-name{font-size:20px;font-weight:600;margin:0 0 2px}
  .person-meta{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .field{margin-bottom:10px}
  .field b{display:block;font-size:11px;text-transform:uppercase;
    letter-spacing:.6px;color:var(--muted);margin-bottom:2px}
  .rels{margin-top:6px}
  .rel{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;
    cursor:pointer;margin-bottom:3px}
  .rel:hover{background:#0c1018}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .rel small{color:var(--muted);margin-left:auto}
  .legend{margin-top:22px;border-top:1px solid var(--line);padding-top:14px}
  .legend h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin:0 0 8px}
  .leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:var(--muted)}
  .hint{position:absolute;bottom:12px;left:14px;color:var(--muted);font-size:11px;
    background:rgba(13,15,20,.7);padding:6px 10px;border-radius:6px;pointer-events:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span>✦</span> Constellation</h1>
    <span class="tag">family map · local · demo data</span>
    <input id="search" placeholder="Search a name…" autocomplete="off">
    <button class="btn" id="reset">Re-center</button>
  </header>
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">drag people · scroll to zoom · click to inspect</div>
  </div>
  <aside id="panel">
    <p class="empty">Click anyone in the map to see who they are and how they connect.</p>
  </aside>
</div>

<script>
/* ───────────────────────────────────────────────────────────
   DATA MODEL — swap this block for real data locally.
   gen = generation tier (0 oldest). type on links:
   "parent" | "spouse" | "half" (half-sibling shown via shared parent)
   This is GENERIC placeholder data — no real names.
   ─────────────────────────────────────────────────────────── */
const DATA = {
  people: [
    {id:"gp1", name:"Eleanor V.",  gen:0, born:1931, died:2019, note:"Matriarch. Kept the family letters."},
    {id:"gp2", name:"Arthur V.",   gen:0, born:1928, died:2002, note:"Worked the rail yards."},
    {id:"p1",  name:"Margaret",    gen:1, born:1955,           note:"Eldest. Lives upstate."},
    {id:"p2",  name:"Daniel",      gen:1, born:1958, died:2016, note:"The father. Much of him was only legible later."},
    {id:"p2x", name:"Carol",       gen:1, born:1960,           note:"Daniel's first relationship — long unrecorded."},
    {id:"sp",  name:"Joan",        gen:1, born:1961,           note:"Married Daniel in '84."},
    {id:"c1",  name:"Drew",        gen:2, born:1985,           note:"Calls himself the eldest."},
    {id:"c2",  name:"Kristen",     gen:2, born:1988,           note:""},
    {id:"c3",  name:"You",         gen:2, born:1991,           note:"The one who went looking."},
    {id:"h1",  name:"Katelyn",     gen:2, born:1982,           note:"Half-sibling. Known to the grandparents, hidden from the rest."},
    {id:"h2",  name:"Renata",      gen:2, born:1986,           note:"Half-sibling. Surfaced through a DNA test nobody expected."},
  ],
  links: [
    {s:"gp1", t:"gp2", type:"spouse"},
    {s:"gp1", t:"p1",  type:"parent"}, {s:"gp2", t:"p1", type:"parent"},
    {s:"gp1", t:"p2",  type:"parent"}, {s:"gp2", t:"p2", type:"parent"},
    {s:"p2",  t:"sp",  type:"spouse"},
    {s:"p2",  t:"c1",  type:"parent"}, {s:"sp", t:"c1", type:"parent"},
    {s:"p2",  t:"c2",  type:"parent"}, {s:"sp", t:"c2", type:"parent"},
    {s:"p2",  t:"c3",  type:"parent"}, {s:"sp", t:"c3", type:"parent"},
    {s:"p2",  t:"h1",  type:"half"},   {s:"carolx", t:"h1", type:"parent", _ghost:true},
    {s:"p2",  t:"h2",  type:"half"},   {s:"p2x", t:"h2", type:"parent"},
  ]
};
/* ─────────────────────────────────────────────────────────── */

const GEN_COLORS = ['--g0','--g1','--g2','--g3','--g4']
  .map(v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim());
const REL_COLORS = {
  parent:getComputedStyle(document.documentElement).getPropertyValue('--rel-parent').trim(),
  spouse:getComputedStyle(document.documentElement).getPropertyValue('--rel-spouse').trim(),
  half:getComputedStyle(document.documentElement).getPropertyValue('--rel-half').trim(),
};

// build node + link objects
const byId = {};
const nodes = DATA.people.map((p,i)=>{
  const n = {...p, x:Math.cos(i)*120+ (Math.random()-.5)*40,
                   y:Math.sin(i*1.7)*120+(Math.random()-.5)*40, vx:0, vy:0, r:22};
  byId[p.id]=n; return n;
});
const links = DATA.links
  .filter(l=>!l._ghost && byId[l.s] && byId[l.t])
  .map(l=>({source:byId[l.s], target:byId[l.t], type:l.type}));

// adjacency for the side panel
const REL_LABEL = {parent:"parent / child", spouse:"partner", half:"half-sibling"};
function relationsOf(node){
  const out=[];
  for(const l of links){
    if(l.source===node) out.push({other:l.target,type:l.type,dir:"down"});
    if(l.target===node) out.push({other:l.source,type:l.type,dir:"up"});
  }
  return out;
}

// ── canvas setup ─────────────────────────────────────────────
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.max(1,window.devicePixelRatio||1);
let view={x:0,y:0,k:1}; // pan + zoom
function resize(){
  const r=cv.getBoundingClientRect(); W=r.width; H=r.height;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  view.x=W/2; view.y=H/2;
}
window.addEventListener('resize',resize);

// ── force simulation ─────────────────────────────────────────
function tick(){
  // repulsion
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    let dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy||0.01, d=Math.sqrt(d2);
    const f=2600/d2; const ux=dx/d, uy=dy/d;
    a.vx-=ux*f; a.vy-=uy*f; b.vx+=ux*f; b.vy+=uy*f;
  }
  // springs
  for(const l of links){
    const a=l.source,b=l.target;
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
    const rest=l.type==='spouse'?70:120;
    const f=(d-rest)*0.02; const ux=dx/d, uy=dy/d;
    a.vx+=ux*f; a.vy+=uy*f; b.vx-=ux*f; b.vy-=uy*f;
  }
  // gentle gen-based vertical ordering + centering
  for(const n of nodes){
    const targetY=(n.gen-2)*110;
    n.vy+=(targetY-n.y)*0.004;
    n.vx+=(0-n.x)*0.002;
    if(n===dragNode){continue;}
    n.vx*=0.86; n.vy*=0.86;
    n.x+=n.vx; n.y+=n.vy;
  }
}

// ── rendering ────────────────────────────────────────────────
let selected=null, hover=null, query="";
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(view.x,view.y); ctx.scale(view.k,view.k);
  // links
  for(const l of links){
    ctx.beginPath();
    ctx.moveTo(l.source.x,l.source.y); ctx.lineTo(l.target.x,l.target.y);
    ctx.strokeStyle=REL_COLORS[l.type]||'#333';
    ctx.lineWidth=(l.type==='half'?2.2:1.6);
    if(l.type==='half') ctx.setLineDash([5,5]); else ctx.setLineDash([]);
    const dim = query && !match(l.source)&&!match(l.target);
    ctx.globalAlpha=dim?0.12:0.65; ctx.stroke();
  }
  ctx.setLineDash([]); ctx.globalAlpha=1;
  // nodes
  for(const n of nodes){
    const dim = query && !match(n);
    ctx.globalAlpha=dim?0.18:1;
    const col=GEN_COLORS[n.gen%GEN_COLORS.length];
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    if(n===selected||n===hover){
      ctx.lineWidth=3; ctx.strokeStyle='#fff'; ctx.stroke();
    }
    ctx.fillStyle='#0d0f14'; ctx.font='600 12px -apple-system,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const init=n.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    ctx.fillText(init,n.x,n.y);
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--ink').trim();
    ctx.font='12px -apple-system,sans-serif'; ctx.textBaseline='top';
    ctx.fillText(n.name,n.x,n.y+n.r+4);
  }
  ctx.globalAlpha=1; ctx.restore();
}
function match(n){ return query && n.name.toLowerCase().includes(query); }

function loop(){ tick(); draw(); requestAnimationFrame(loop); }

// ── interaction ──────────────────────────────────────────────
function toWorld(mx,my){ return {x:(mx-view.x)/view.k, y:(my-view.y)/view.k}; }
function pick(mx,my){
  const w=toWorld(mx,my);
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i], dx=w.x-n.x, dy=w.y-n.y;
    if(dx*dx+dy*dy<=n.r*n.r) return n;
  }
  return null;
}
let dragNode=null, panning=false, last={x:0,y:0}, moved=false;
cv.addEventListener('mousedown',e=>{
  const n=pick(e.offsetX,e.offsetY); moved=false;
  if(n){ dragNode=n; cv.classList.add('drag'); }
  else { panning=true; last={x:e.offsetX,y:e.offsetY}; cv.classList.add('drag'); }
});
window.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  if(dragNode){ const w=toWorld(mx,my); dragNode.x=w.x; dragNode.y=w.y; dragNode.vx=dragNode.vy=0; moved=true; }
  else if(panning){ view.x+=mx-last.x; view.y+=my-last.y; last={x:mx,y:my}; moved=true; }
  else { hover=pick(mx,my); cv.style.cursor=hover?'pointer':'grab'; }
});
window.addEventListener('mouseup',e=>{
  if(dragNode&&!moved) select(dragNode);
  else if(!dragNode&&!panning){}
  dragNode=null; panning=false; cv.classList.remove('drag');
});
cv.addEventListener('click',e=>{ if(!moved){ const n=pick(e.offsetX,e.offsetY); select(n); } });
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const wx=(e.offsetX-view.x)/view.k, wy=(e.offsetY-view.y)/view.k;
  view.k=Math.min(3,Math.max(.35,view.k*f));
  view.x=e.offsetX-wx*view.k; view.y=e.offsetY-wy*view.k;
},{passive:false});

// ── side panel ───────────────────────────────────────────────
const panel=document.getElementById('panel');
function select(n){
  selected=n;
  if(!n){ panel.innerHTML='<p class="empty">Click anyone in the map to see who they are and how they connect.</p>'; return; }
  const lifespan = n.born ? (n.born + (n.died?(' – '+n.died):' – present')) : '';
  const rels=relationsOf(n);
  const relHtml = rels.map(r=>{
    const col=REL_COLORS[r.type]||'#555';
    return `<div class="rel" data-id="${r.other.id}">
      <span class="dot" style="background:${col}"></span>
      <span>${r.other.name}</span>
      <small>${REL_LABEL[r.type]}</small></div>`;
  }).join('') || '<div class="empty">No recorded connections.</div>';
  panel.innerHTML=`
    <h2 class="person-name">${n.name}</h2>
    <div class="person-meta">${lifespan}${lifespan&&'  ·  '}generation ${n.gen}</div>
    ${n.note?`<div class="field"><b>Note</b>${n.note}</div>`:''}
    <div class="field"><b>Connections</b><div class="rels">${relHtml}</div></div>
    <div class="legend">
      <h3>Relationship lines</h3>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.parent}"></span>parent / child</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.spouse}"></span>partner</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.half}"></span>half-sibling (dashed)</div>
    </div>`;
  panel.querySelectorAll('.rel').forEach(el=>el.onclick=()=>{
    const t=byId[el.dataset.id]; if(t){select(t);
      view.x=W/2-t.x*view.k; view.y=H/2-t.y*view.k;}
  });
}

document.getElementById('search').addEventListener('input',e=>{ query=e.target.value.trim().toLowerCase(); });
document.getElementById('reset').onclick=()=>{ view.x=W/2; view.y=H/2; view.k=1; };

resize(); loop();
</script>
</body>
</html>
