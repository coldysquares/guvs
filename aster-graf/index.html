<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07101b" />
  <meta
    name="description"
    content="Aster Graf is a provenance-first membrane explorer for people, arguments, and other connected substrates."
  />
  <title>Aster Graf — Membrane Explorer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../shared/membrane-runtime.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="aster-app">
    <header class="aster-bar">
      <div class="aster-brand">
        <a class="aster-home" href="../" aria-label="Back to all GUVs">← GUVs</a>
        <div class="aster-title">
          <span class="aster-mark" aria-hidden="true">✦</span>
          <div>
            <h1>Aster Graf</h1>
            <p>Aster = star · graf = graph</p>
          </div>
        </div>
      </div>

      <div class="aster-lenses" role="group" aria-label="Choose an Aster data lens">
        <button class="aster-lens" type="button" data-dataset="family" aria-pressed="true">
          <span>Family</span>
          <small>people + claims</small>
        </button>
        <button class="aster-lens" type="button" data-dataset="pitch" aria-pressed="false">
          <span>Pitch</span>
          <small>argument + proof</small>
        </button>
      </div>

      <div class="aster-local" title="This demonstration stores exploration progress on this device">
        <span aria-hidden="true"></span>
        local demo
      </div>
    </header>

    <main id="membraneApp" aria-label="Aster Graf membrane explorer"></main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
