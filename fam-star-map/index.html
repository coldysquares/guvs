<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fam Star Map</title>
<style>
  :root {
    --bg: #080c16;
    --bg-2: #0c1324;
    --panel: rgba(12, 18, 34, 0.94);
    --panel-2: rgba(8, 12, 22, 0.88);
    --line: rgba(124, 92, 255, 0.22);
    --line-2: rgba(146, 168, 230, 0.18);
    --ink: #eef3ff;
    --muted: #a2acc7;
    --faint: #73809d;

    --accent: #7c5cff;
    --accent-2: #9a7cff;
    --gold: #f4d67c;
    --cyan: #82dcff;
    --teal: #85eadb;
    --rose: #ff9fb4;
    --violet: #9878ff;
    --lav: #cbb7ff;

    --shadow-panel: 0 18px 70px rgba(0, 0, 0, 0.36);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    height: 100%;
    background:
      radial-gradient(circle at 18% 0%, rgba(124, 92, 255, 0.16), transparent 34%),
      radial-gradient(circle at 88% 22%, rgba(82, 132, 255, 0.12), transparent 30%),
      linear-gradient(180deg, #0a1020 0%, #080c16 100%);
    color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  #app {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    grid-template-rows: 60px minmax(0, 1fr);
    height: 100%;
    overflow: hidden;
  }

  header {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line-2);
    background: rgba(10, 15, 29, 0.92);
    backdrop-filter: blur(16px);
  }

  h1 {
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    font-weight: 750;
    letter-spacing: -0.03em;
    white-space: nowrap;
  }

  .spark {
    color: var(--gold);
    filter: drop-shadow(0 0 10px rgba(244, 214, 124, 0.32));
  }

  .tag {
    color: var(--muted);
    border: 1px solid var(--line);
    background: rgba(124, 92, 255, 0.07);
    padding: 4px 11px;
    border-radius: 999px;
    font-size: 11px;
    white-space: nowrap;
  }

  .controls {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }

  #search {
    width: min(300px, 30vw);
    padding: 10px 13px;
    border-radius: 13px;
    border: 1px solid rgba(124, 92, 255, 0.24);
    background: rgba(6, 10, 19, 0.72);
    color: var(--ink);
    outline: none;
  }

  #search::placeholder { color: #7d89a8; }

  #search:focus {
    border-color: rgba(124, 92, 255, 0.58);
    box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.14);
  }

  .btn {
    border: 1px solid rgba(124, 92, 255, 0.30);
    background: rgba(8, 12, 22, 0.84);
    color: var(--ink);
    padding: 10px 13px;
    border-radius: 13px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
  }

  .btn:hover {
    transform: translateY(-1px);
    border-color: rgba(124, 92, 255, 0.56);
    background: rgba(18, 25, 46, 0.94);
  }

  .btn.active {
    background: linear-gradient(180deg, rgba(124, 92, 255, 0.27), rgba(124, 92, 255, 0.14));
    border-color: rgba(124, 92, 255, 0.62);
  }

  #stage {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 48% 44%, rgba(124, 92, 255, 0.14), transparent 35%),
      radial-gradient(circle at 42% 52%, rgba(96, 139, 255, 0.13), transparent 28%),
      linear-gradient(180deg, #0a1020 0%, #080d19 100%);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }

  canvas.dragging { cursor: grabbing; }

  .hint {
    position: absolute;
    left: 16px;
    bottom: 16px;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 11px;
    color: var(--muted);
    background: rgba(6, 9, 17, 0.64);
    border: 1px solid rgba(124, 92, 255, 0.16);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }

  .zoomDock {
    position: absolute;
    right: 16px;
    bottom: 16px;
    display: flex;
    gap: 6px;
    padding: 6px;
    border-radius: 15px;
    background: rgba(6, 9, 17, 0.62);
    border: 1px solid rgba(124, 92, 255, 0.16);
    backdrop-filter: blur(10px);
  }

  .miniBtn {
    width: 34px;
    height: 32px;
    border-radius: 11px;
    border: 1px solid rgba(124, 92, 255, 0.24);
    background: rgba(16, 23, 42, 0.84);
    color: var(--ink);
    cursor: pointer;
    font-size: 16px;
  }

  .miniBtn:hover {
    border-color: rgba(124, 92, 255, 0.58);
    background: rgba(124, 92, 255, 0.12);
  }

  aside {
    border-left: 1px solid var(--line-2);
    background: rgba(9, 14, 27, 0.94);
    backdrop-filter: blur(16px);
    padding: 18px;
    overflow: auto;
  }

  .eyebrow {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

  .person-name {
    margin: 0 0 2px;
    font-size: 22px;
    font-weight: 760;
    letter-spacing: -0.03em;
  }

  .person-meta {
    color: var(--muted);
    font-size: 12.5px;
    margin-bottom: 14px;
  }

  .field { margin-bottom: 14px; }

  .field b {
    display: block;
    margin-bottom: 4px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .rels { margin-top: 6px; }

  .rel {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 120ms ease;
  }

  .rel:hover { background: rgba(124, 92, 255, 0.09); }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 auto;
  }

  .rel small {
    color: var(--muted);
    margin-left: auto;
    text-align: right;
  }

  .legend {
    margin-top: 22px;
    border-top: 1px solid var(--line-2);
    padding-top: 14px;
  }

  .legend h3 {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 10px;
  }

  .leg-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  @media (max-width: 940px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto minmax(60vh, 1fr) 270px;
    }

    header {
      grid-column: 1;
      flex-wrap: wrap;
      height: auto;
    }

    .controls {
      width: 100%;
      margin-left: 0;
      flex-wrap: wrap;
    }

    #search {
      width: 100%;
      max-width: none;
      flex: 1 1 100%;
    }

    aside {
      border-left: 0;
      border-top: 1px solid var(--line-2);
    }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="spark">✦</span> Fam Star Map</h1>
    <span class="tag">House of Atreus · public-domain myth demo</span>

    <div class="controls">
      <input id="search" placeholder="Search the constellation…" autocomplete="off" />
      <button class="btn" id="freeze">Freeze</button>
      <button class="btn" id="fit">Fit</button>
    </div>
  </header>

  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">drag stars · scroll/pinch to zoom · click to inspect · fit returns to the full constellation</div>
    <div class="zoomDock" aria-label="Zoom controls">
      <button class="miniBtn" id="zoomOut" title="Zoom out">−</button>
      <button class="miniBtn" id="zoomIn" title="Zoom in">+</button>
    </div>
  </div>

  <aside id="panel">
    <div class="eyebrow">Mythic demo data</div>
    <p class="empty">Click any star in the map to inspect its role, notes, and visible connections.</p>
  </aside>
</div>

<script>
const DATA = {
  people: [
    { id: "tantalus", name: "Tantalus", gen: 0, role: "Origin node", note: "Mythic origin point of the cursed line." },
    { id: "pelops", name: "Pelops", gen: 1, role: "Dynastic node", note: "Central ancestor whose descendants define the House of Atreus." },
    { id: "hippodamia", name: "Hippodamia", gen: 1, role: "Partner node", note: "Paired with Pelops in the founding branch." },
    { id: "atreus", name: "Atreus", gen: 2, role: "Primary branch", note: "One of the two defining brothers in the central rupture." },
    { id: "thyestes", name: "Thyestes", gen: 2, role: "Counter-branch", note: "Sibling rival to Atreus. A core fracture point in the constellation." },
    { id: "aerope", name: "Aerope", gen: 3, role: "Partner node", note: "Connected to Atreus; entangled in the line’s instability." },
    { id: "pelopia", name: "Pelopia", gen: 3, role: "Partner node", note: "Linked to Thyestes and the shadow branch below." },
    { id: "agamemnon", name: "Agamemnon", gen: 4, role: "Descendant node", note: "One of Atreus’s most famous descendants." },
    { id: "menelaus", name: "Menelaus", gen: 4, role: "Descendant node", note: "Brother of Agamemnon; another highly visible branch." },
    { id: "aegisthus", name: "Aegisthus", gen: 4, role: "Shadow descendant", note: "A destabilizing line emerging from the counter-branch." },
    { id: "helen", name: "Helen", gen: 4, role: "Partner node", note: "Paired here as the Menelaus branch’s most recognizable counterpart." },
    { id: "clytemnestra", name: "Clytemnestra", gen: 5, role: "Partner node", note: "Partner of Agamemnon and a major node in the tragic continuation." },
    { id: "orestes", name: "Orestes", gen: 6, role: "Descendant node", note: "A continuation point where the family curse remains legible." },
    { id: "electra", name: "Electra", gen: 6, role: "Descendant node", note: "Sibling branch tied tightly to the Orestes line." },
    { id: "hermione", name: "Hermione", gen: 5, role: "Descendant node", note: "A child branch extending from Menelaus and Helen." }
  ],
  links: [
    { source: "tantalus", target: "pelops", type: "parent" },
    { source: "pelops", target: "hippodamia", type: "partner" },
    { source: "pelops", target: "atreus", type: "parent" },
    { source: "hippodamia", target: "atreus", type: "parent" },
    { source: "pelops", target: "thyestes", type: "parent" },
    { source: "hippodamia", target: "thyestes", type: "parent" },
    { source: "atreus", target: "aerope", type: "partner" },
    { source: "thyestes", target: "pelopia", type: "partner" },
    { source: "atreus", target: "agamemnon", type: "parent" },
    { source: "aerope", target: "agamemnon", type: "parent" },
    { source: "atreus", target: "menelaus", type: "parent" },
    { source: "aerope", target: "menelaus", type: "parent" },
    { source: "thyestes", target: "aegisthus", type: "parent" },
    { source: "pelopia", target: "aegisthus", type: "parent" },
    { source: "menelaus", target: "helen", type: "partner" },
    { source: "agamemnon", target: "clytemnestra", type: "partner" },
    { source: "agamemnon", target: "orestes", type: "parent" },
    { source: "clytemnestra", target: "orestes", type: "parent" },
    { source: "agamemnon", target: "electra", type: "parent" },
    { source: "clytemnestra", target: "electra", type: "parent" },
    { source: "menelaus", target: "hermione", type: "parent" },
    { source: "helen", target: "hermione", type: "parent" }
  ]
};

const REL_LABEL = {
  parent: "parent / child",
  child: "child / parent",
  partner: "partner",
  sibling: "sibling",
  half: "partial sibling line"
};

const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const panel = document.getElementById("panel");
const stage = document.getElementById("stage");

const nodePalette = ["#85eadb", "#78b8ff", "#f4d67c", "#ff9fb4", "#cbb7ff", "#9878ff", "#82dcff"];
const byId = {};
const nodes = DATA.people.map(person => {
  const node = { ...person, x: 0, y: 0, vx: 0, vy: 0, r: 22 };
  byId[node.id] = node;
  return node;
});

const directLinks = DATA.links
  .filter(link => byId[link.source] && byId[link.target])
  .map(link => ({ source: byId[link.source], target: byId[link.target], type: link.type }));

positionNodesByGeneration();
const siblingLinks = deriveSiblingLinks();
const visualLinks = [...directLinks, ...siblingLinks];

const STARS = [];
let W = 0;
let H = 0;
let DPR = Math.max(1, window.devicePixelRatio || 1);

let view = { x: 0, y: 0, k: 1 };
let targetView = { x: 0, y: 0, k: 1 };
let selected = null;
let hover = null;
let query = "";
let dragNode = null;
let panning = false;
let moved = false;
let last = { x: 0, y: 0 };
let firstFitDone = false;
let physicsFrozen = false;
let userCameraActive = false;

function positionNodesByGeneration() {
  const groups = new Map();

  for (const node of nodes) {
    if (!groups.has(node.gen)) groups.set(node.gen, []);
    groups.get(node.gen).push(node);
  }

  for (const [gen, group] of groups.entries()) {
    group.forEach((node, index) => {
      node.x = (index - (group.length - 1) / 2) * 132;
      node.y = (gen - 2.55) * 108;
    });
  }

  if (byId.tantalus) byId.tantalus.y -= 18;
  if (byId.hippodamia) byId.hippodamia.x += 44;
  if (byId.thyestes) byId.thyestes.x += 16;
  if (byId.aerope) byId.aerope.x -= 70;
  if (byId.pelopia) byId.pelopia.x += 74;
  if (byId.agamemnon) byId.agamemnon.x -= 58;
  if (byId.menelaus) byId.menelaus.x += 58;
  if (byId.aegisthus) byId.aegisthus.x += 40;
  if (byId.helen) byId.helen.x += 120;
  if (byId.hermione) byId.hermione.x += 120;
  if (byId.clytemnestra) byId.clytemnestra.x -= 100;
  if (byId.orestes) byId.orestes.x -= 128;
}

function parentsOf(node) {
  return directLinks.filter(link => link.type === "parent" && link.target === node).map(link => link.source);
}

function childrenOf(node) {
  return directLinks.filter(link => link.type === "parent" && link.source === node).map(link => link.target);
}

function partnersOf(node) {
  return directLinks
    .filter(link => link.type === "partner" && (link.source === node || link.target === node))
    .map(link => link.source === node ? link.target : link.source);
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const ids = new Set(a.map(node => node.id));
  return b.every(node => ids.has(node.id));
}

function sharedParents(a, b) {
  const aParents = parentsOf(a);
  const bParents = parentsOf(b);
  const bIds = new Set(bParents.map(node => node.id));
  return aParents.filter(parent => bIds.has(parent.id));
}

function deriveSiblingLinks() {
  const links = [];

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const shared = sharedParents(a, b);
      if (!shared.length) continue;
      const type = sameSet(parentsOf(a), parentsOf(b)) ? "sibling" : "half";
      links.push({ source: a, target: b, type });
    }
  }

  return links;
}

function relationsOf(node) {
  const out = [];

  for (const parent of parentsOf(node)) out.push({ other: parent, type: "parent" });
  for (const child of childrenOf(node)) out.push({ other: child, type: "child" });
  for (const partner of partnersOf(node)) out.push({ other: partner, type: "partner" });

  for (const link of siblingLinks) {
    if (link.source === node) out.push({ other: link.target, type: link.type });
    if (link.target === node) out.push({ other: link.source, type: link.type });
  }

  return out;
}

function makeStars() {
  STARS.length = 0;
  const count = Math.max(110, Math.floor((W * H) / 11000));

  for (let i = 0; i < count; i++) {
    STARS.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.45 + 0.25,
      a: Math.random() * 0.60 + 0.14
    });
  }
}

function resize() {
  const rect = cv.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  DPR = Math.max(1, window.devicePixelRatio || 1);

  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  makeStars();

  if (!firstFitDone) {
    fitGraph(true);
    firstFitDone = true;
  } else if (!userCameraActive) {
    fitGraph(true);
  }
}

window.addEventListener("resize", resize);

function graphBounds() {
  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;

  for (const node of nodes) {
    minX = Math.min(minX, node.x - node.r - 48);
    maxX = Math.max(maxX, node.x + node.r + 48);
    minY = Math.min(minY, node.y - node.r - 48);
    maxY = Math.max(maxY, node.y + node.r + 56);
  }

  return { minX, minY, maxX, maxY };
}

function fitGraph(immediate = false) {
  const b = graphBounds();
  const graphW = Math.max(1, b.maxX - b.minX);
  const graphH = Math.max(1, b.maxY - b.minY);
  const padding = clamp(Math.min(W, H) * 0.12, 38, 92);
  const k = clamp(Math.min((W - padding * 2) / graphW, (H - padding * 2) / graphH) * 1.08, 0.52, 1.46);
  const cx = (b.minX + b.maxX) / 2;
  const cy = (b.minY + b.maxY) / 2;

  setCamera({ x: W / 2 - cx * k, y: H / 2 - cy * k, k }, immediate);
  userCameraActive = false;
}

function setCamera(next, immediate = false) {
  targetView = { ...next };
  if (immediate) view = { ...next };
}

function flyToNode(node) {
  const k = clamp(Math.max(targetView.k, 1.04), 0.78, 1.42);
  setCamera({ x: W / 2 - node.x * k, y: H / 2 - node.y * k, k });
  userCameraActive = true;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function tickPhysics() {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d2 = dx * dx + dy * dy || 0.01;
      let d = Math.sqrt(d2);
      let force = 2050 / d2;
      let ux = dx / d;
      let uy = dy / d;

      a.vx -= ux * force;
      a.vy -= uy * force;
      b.vx += ux * force;
      b.vy += uy * force;
    }
  }

  for (const link of visualLinks) {
    const a = link.source;
    const b = link.target;
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    let rest = link.type === "partner" ? 86 : link.type === "sibling" ? 125 : link.type === "half" ? 148 : 104;
    let stiffness = link.type === "half" ? 0.007 : link.type === "sibling" ? 0.009 : 0.020;
    let force = (d - rest) * stiffness;
    let ux = dx / d;
    let uy = dy / d;

    a.vx += ux * force;
    a.vy += uy * force;
    b.vx -= ux * force;
    b.vy -= uy * force;
  }

  for (const node of nodes) {
    const targetY = (node.gen - 2.55) * 108;
    node.vy += (targetY - node.y) * 0.003;
    node.vx += (0 - node.x) * 0.0013;

    if (node !== dragNode) {
      node.vx *= 0.875;
      node.vy *= 0.875;
      node.x += node.vx;
      node.y += node.vy;
    }
  }
}

function tickCamera() {
  view.x += (targetView.x - view.x) * 0.22;
  view.y += (targetView.y - view.y) * 0.22;
  view.k += (targetView.k - view.k) * 0.24;
}

function drawBackground() {
  for (const star of STARS) {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(235, 241, 255, ${star.a})`;
    ctx.fill();
  }
}

function relationColor(type) {
  if (type === "parent") return "rgba(112, 170, 255, 0.78)";
  if (type === "partner") return "rgba(244, 214, 124, 0.72)";
  if (type === "sibling") return "rgba(133, 234, 219, 0.56)";
  if (type === "half") return "rgba(154, 124, 255, 0.72)";
  return "rgba(150, 170, 220, 0.45)";
}

function matches(node) {
  return query && (
    node.name.toLowerCase().includes(query) ||
    node.role.toLowerCase().includes(query) ||
    node.note.toLowerCase().includes(query)
  );
}

function initials(name) {
  return name.split(/\s+/).map(part => part[0]).join("").slice(0, 2).toUpperCase();
}

function screenRadius(value) {
  return value / Math.sqrt(view.k);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.k, view.k);

  for (const link of visualLinks) {
    const dim = query && !matches(link.source) && !matches(link.target);

    ctx.beginPath();
    ctx.moveTo(link.source.x, link.source.y);
    ctx.lineTo(link.target.x, link.target.y);

    ctx.strokeStyle = relationColor(link.type);
    ctx.lineWidth = link.type === "half" ? 1.9 : link.type === "partner" ? 1.6 : 1.3;
    ctx.globalAlpha = dim ? 0.08 : link.type === "half" ? 0.42 : 0.56;

    if (link.type === "half") ctx.setLineDash([4, 8]);
    else if (link.type === "sibling") ctx.setLineDash([2, 9]);
    else ctx.setLineDash([]);

    ctx.shadowBlur = link.type === "partner" ? 8 : 13;
    ctx.shadowColor = relationColor(link.type);
    ctx.stroke();
  }

  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  for (const node of nodes) {
    const dim = query && !matches(node);
    const fill = nodePalette[node.gen % nodePalette.length];
    const r = screenRadius(node.r);

    ctx.globalAlpha = dim ? 0.18 : 1;

    ctx.beginPath();
    ctx.arc(node.x, node.y, r + 8 / view.k, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(124, 92, 255, 0.075)";
    ctx.shadowBlur = node === selected ? 34 : 18;
    ctx.shadowColor = node === selected ? "rgba(154, 124, 255, 0.56)" : fill;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();

    ctx.lineWidth = node === selected ? 3 / view.k : node === hover ? 2.3 / view.k : 1.15 / view.k;
    ctx.strokeStyle = node === selected ? "#ffffff" : "rgba(255,255,255,0.20)";
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = "#0b1020";
    ctx.font = `${Math.max(10, 12 / Math.sqrt(view.k))}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
    ctx.font = `750 ${Math.max(10, 12 / Math.sqrt(view.k))}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(initials(node.name), node.x, node.y);

    ctx.fillStyle = "rgba(238, 243, 255, 0.94)";
    ctx.font = `600 ${Math.max(10, 12 / Math.sqrt(view.k))}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
    ctx.textBaseline = "top";
    ctx.fillText(node.name, node.x, node.y + r + 6 / view.k);
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function loop() {
  if (!physicsFrozen) tickPhysics();
  tickCamera();
  draw();
  requestAnimationFrame(loop);
}

function pointFromEvent(event) {
  const rect = cv.getBoundingClientRect();
  return { x: event.clientX - rect.left, y: event.clientY - rect.top };
}

function toWorld(x, y, v = view) {
  return { x: (x - v.x) / v.k, y: (y - v.y) / v.k };
}

function pick(x, y) {
  const world = toWorld(x, y);

  for (let i = nodes.length - 1; i >= 0; i--) {
    const node = nodes[i];
    const r = screenRadius(node.r);
    const dx = world.x - node.x;
    const dy = world.y - node.y;
    if (dx * dx + dy * dy <= r * r) return node;
  }

  return null;
}

function zoomAt(screenX, screenY, factor) {
  const old = { ...view };
  const world = toWorld(screenX, screenY, old);
  const k = clamp(old.k * factor, 0.42, 2.65);
  const next = {
    x: screenX - world.x * k,
    y: screenY - world.y * k,
    k
  };

  view = { ...next };
  targetView = { ...next };
  userCameraActive = true;
}

cv.addEventListener("pointerdown", event => {
  const p = pointFromEvent(event);
  const node = pick(p.x, p.y);

  moved = false;
  cv.setPointerCapture(event.pointerId);

  if (node) {
    dragNode = node;
    cv.classList.add("dragging");
  } else {
    panning = true;
    last = p;
    cv.classList.add("dragging");
  }
});

cv.addEventListener("pointermove", event => {
  const p = pointFromEvent(event);

  if (dragNode) {
    const world = toWorld(p.x, p.y);
    dragNode.x = world.x;
    dragNode.y = world.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
    moved = true;
    userCameraActive = true;
    return;
  }

  if (panning) {
    const dx = p.x - last.x;
    const dy = p.y - last.y;
    view.x += dx;
    view.y += dy;
    targetView.x += dx;
    targetView.y += dy;
    last = p;
    moved = true;
    userCameraActive = true;
    return;
  }

  hover = pick(p.x, p.y);
  cv.style.cursor = hover ? "pointer" : "grab";
});

cv.addEventListener("pointerup", event => {
  const p = pointFromEvent(event);

  if (dragNode && !moved) {
    select(dragNode, true);
  } else if (!dragNode && !panning && !moved) {
    select(pick(p.x, p.y), true);
  }

  dragNode = null;
  panning = false;
  cv.classList.remove("dragging");
});

cv.addEventListener("wheel", event => {
  event.preventDefault();
  const raw = Math.exp(-event.deltaY * 0.0018);
  const factor = clamp(raw, 0.82, 1.22);
  zoomAt(event.offsetX, event.offsetY, factor);
}, { passive: false });

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function select(node, moveCamera = false) {
  selected = node;

  if (!node) {
    panel.innerHTML = `
      <div class="eyebrow">Mythic demo data</div>
      <p class="empty">Click any star in the map to inspect its role, notes, and visible connections.</p>
    `;
    return;
  }

  const relations = relationsOf(node);
  const relationHtml = relations.length
    ? relations.map(relation => `
        <div class="rel" data-id="${escapeHtml(relation.other.id)}">
          <span class="dot" style="background:${relationColor(relation.type)}"></span>
          <span>${escapeHtml(relation.other.name)}</span>
          <small>${escapeHtml(REL_LABEL[relation.type] || relation.type)}</small>
        </div>
      `).join("")
    : '<div class="empty">No recorded connections.</div>';

  panel.innerHTML = `
    <div class="eyebrow">Mythic demo data</div>
    <h2 class="person-name">${escapeHtml(node.name)}</h2>
    <div class="person-meta">generation ${escapeHtml(node.gen)} · ${escapeHtml(node.role)}</div>

    <div class="field">
      <b>Note</b>
      ${escapeHtml(node.note)}
    </div>

    <div class="field">
      <b>Connections</b>
      <div class="rels">${relationHtml}</div>
    </div>

    <div class="legend">
      <h3>Relationship lines</h3>
      <div class="leg-row"><span class="dot" style="background:${relationColor("parent")}"></span>parent / child</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor("partner")}"></span>partner</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor("sibling")}"></span>sibling</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor("half")}"></span>partial sibling line</div>
    </div>
  `;

  panel.querySelectorAll(".rel").forEach(element => {
    element.addEventListener("click", () => {
      const target = byId[element.dataset.id];
      if (!target) return;
      select(target, true);
    });
  });

  if (moveCamera) flyToNode(node);
}

document.getElementById("search").addEventListener("input", event => {
  query = event.target.value.trim().toLowerCase();
});

document.getElementById("fit").addEventListener("click", () => fitGraph(false));

document.getElementById("zoomIn").addEventListener("click", () => zoomAt(W / 2, H / 2, 1.18));
document.getElementById("zoomOut").addEventListener("click", () => zoomAt(W / 2, H / 2, 0.84));

document.getElementById("freeze").addEventListener("click", event => {
  physicsFrozen = !physicsFrozen;
  event.currentTarget.classList.toggle("active", physicsFrozen);
  event.currentTarget.textContent = physicsFrozen ? "Unfreeze" : "Freeze";
});

resize();
loop();
</script>
</body>
</html>
