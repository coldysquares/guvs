<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fam Star Map</title>
<style>
  :root {
    --bg: #090d17;
    --bg-2: #0e1526;
    --panel: rgba(12, 18, 34, 0.92);
    --panel-2: rgba(10, 15, 28, 0.94);
    --line: rgba(108, 133, 204, 0.22);
    --ink: #eef3ff;
    --muted: #9ca8c4;

    --accent: #7c5cff;
    --accent-soft: rgba(124, 92, 255, 0.24);
    --accent-soft-2: rgba(124, 92, 255, 0.12);
    --gold: #f4ce73;
    --teal: #7ee4d2;
    --rose: #ff9eb2;
    --lav: #c8b0ff;
    --blue: #77b4ff;

    --rel-parent: rgba(105, 166, 255, 0.78);
    --rel-partner: rgba(244, 206, 115, 0.72);
    --rel-sibling: rgba(126, 228, 210, 0.62);
    --rel-half: rgba(162, 123, 255, 0.72);

    --glow-accent: 0 0 0 1px rgba(124, 92, 255, 0.28), 0 0 24px rgba(124, 92, 255, 0.16);
    --shadow-panel: 0 20px 60px rgba(0, 0, 0, 0.34);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    height: 100%;
    background:
      radial-gradient(circle at 20% 0%, rgba(68, 102, 194, 0.18), transparent 34%),
      radial-gradient(circle at 85% 18%, rgba(124, 92, 255, 0.14), transparent 28%),
      linear-gradient(180deg, #0b1120 0%, #090d17 100%);
    color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  #app {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    grid-template-rows: auto minmax(0, 1fr);
    height: 100%;
  }

  header {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(17, 25, 46, 0.92), rgba(12, 18, 34, 0.92));
    backdrop-filter: blur(14px);
  }

  h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spark {
    color: var(--gold);
    filter: drop-shadow(0 0 10px rgba(244, 206, 115, 0.3));
  }

  .tag {
    color: var(--muted);
    border: 1px solid var(--line);
    background: rgba(124, 92, 255, 0.06);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    white-space: nowrap;
  }

  .controls {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
    min-width: 0;
  }

  #search {
    width: 300px;
    max-width: 36vw;
    padding: 11px 14px;
    border-radius: 14px;
    border: 1px solid rgba(124, 92, 255, 0.22);
    background: rgba(7, 11, 20, 0.78);
    color: var(--ink);
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
  }

  #search::placeholder {
    color: #7f8ca9;
  }

  #search:focus {
    border-color: rgba(124, 92, 255, 0.5);
    box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.14);
  }

  .btn {
    border: 1px solid rgba(124, 92, 255, 0.28);
    background: rgba(9, 13, 23, 0.86);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 13px;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    box-shadow: var(--glow-accent);
  }

  .btn:hover {
    transform: translateY(-1px);
    border-color: rgba(124, 92, 255, 0.48);
    background: rgba(15, 21, 38, 0.94);
  }

  .btn.active {
    background: linear-gradient(180deg, rgba(124, 92, 255, 0.24), rgba(124, 92, 255, 0.14));
    border-color: rgba(124, 92, 255, 0.54);
  }

  #stage {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 40%, rgba(95, 121, 191, 0.16), transparent 36%),
      radial-gradient(circle at 20% 15%, rgba(124, 92, 255, 0.11), transparent 24%),
      linear-gradient(180deg, #0b1120 0%, #0a1020 100%);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }

  canvas.dragging {
    cursor: grabbing;
  }

  .hint {
    position: absolute;
    left: 16px;
    bottom: 16px;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 11px;
    color: var(--muted);
    background: rgba(6, 9, 17, 0.6);
    border: 1px solid rgba(124, 92, 255, 0.14);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }

  aside {
    border-left: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(12, 18, 34, 0.95), rgba(10, 15, 29, 0.95));
    backdrop-filter: blur(16px);
    padding: 18px;
    overflow: auto;
  }

  .eyebrow {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

  .person-name {
    margin: 0 0 2px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .person-meta {
    color: var(--muted);
    font-size: 12.5px;
    margin-bottom: 14px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field b {
    display: block;
    margin-bottom: 4px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .rels {
    margin-top: 6px;
  }

  .rel {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 120ms ease;
  }

  .rel:hover {
    background: rgba(124, 92, 255, 0.08);
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 auto;
  }

  .rel small {
    color: var(--muted);
    margin-left: auto;
    text-align: right;
  }

  .legend {
    margin-top: 22px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }

  .legend h3 {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 10px;
  }

  .leg-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  @media (max-width: 980px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto minmax(56vh, 1fr) 280px;
    }

    header {
      grid-column: 1;
      flex-wrap: wrap;
      align-items: stretch;
    }

    .controls {
      width: 100%;
      margin-left: 0;
      flex-wrap: wrap;
    }

    #search {
      width: 100%;
      max-width: none;
      flex: 1 1 100%;
    }

    aside {
      border-left: 0;
      border-top: 1px solid var(--line);
    }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="spark">✦</span> Fam Star Map</h1>
    <span class="tag">House of Atreus · public-domain myth demo</span>

    <div class="controls">
      <input id="search" placeholder="Search the constellation…" autocomplete="off" />
      <button class="btn" id="freeze">Freeze</button>
      <button class="btn" id="reset">Re-center</button>
    </div>
  </header>

  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">drag stars · scroll to zoom · click to inspect · freeze to hold the sky still</div>
  </div>

  <aside id="panel">
    <div class="eyebrow">Mythic demo data</div>
    <p class="empty">Click any star in the map to inspect its role, notes, and visible connections.</p>
  </aside>
</div>

<script>
const DATA = {
  people: [
    { id: "tantalus", name: "Tantalus", gen: 0, role: "Origin node", note: "Mythic origin point of the cursed line." },
    { id: "pelops", name: "Pelops", gen: 1, role: "Dynastic node", note: "Central ancestor whose descendants define the House of Atreus." },
    { id: "hippodamia", name: "Hippodamia", gen: 1, role: "Partner node", note: "Paired with Pelops in the founding branch." },

    { id: "atreus", name: "Atreus", gen: 2, role: "Primary branch", note: "One of the two defining brothers in the central rupture." },
    { id: "thyestes", name: "Thyestes", gen: 2, role: "Counter-branch", note: "Sibling rival to Atreus. A core fracture point in the constellation." },

    { id: "aerope", name: "Aerope", gen: 3, role: "Partner node", note: "Connected to Atreus; entangled in the line’s instability." },
    { id: "pelopia", name: "Pelopia", gen: 3, role: "Partner node", note: "Linked to Thyestes and the shadow branch below." },

    { id: "agamemnon", name: "Agamemnon", gen: 4, role: "Descendant node", note: "One of Atreus’s most famous descendants." },
    { id: "menelaus", name: "Menelaus", gen: 4, role: "Descendant node", note: "Brother of Agamemnon; another highly visible branch." },
    { id: "aegisthus", name: "Aegisthus", gen: 4, role: "Shadow descendant", note: "A destabilizing line emerging from the counter-branch." },
    { id: "helen", name: "Helen", gen: 4, role: "Partner node", note: "Paired here as the Menelaus branch’s most recognizable counterpart." },

    { id: "clytemnestra", name: "Clytemnestra", gen: 5, role: "Partner node", note: "Partner of Agamemnon and a major node in the tragic continuation." },
    { id: "orestes", name: "Orestes", gen: 6, role: "Descendant node", note: "A continuation point where the family curse remains legible." },
    { id: "electra", name: "Electra", gen: 6, role: "Descendant node", note: "Sibling branch tied tightly to the Orestes line." },
    { id: "hermione", name: "Hermione", gen: 5, role: "Descendant node", note: "A child branch extending from Menelaus and Helen." }
  ],

  links: [
    { source: "tantalus", target: "pelops", type: "parent" },

    { source: "pelops", target: "hippodamia", type: "partner" },

    { source: "pelops", target: "atreus", type: "parent" },
    { source: "hippodamia", target: "atreus", type: "parent" },
    { source: "pelops", target: "thyestes", type: "parent" },
    { source: "hippodamia", target: "thyestes", type: "parent" },

    { source: "atreus", target: "aerope", type: "partner" },
    { source: "thyestes", target: "pelopia", type: "partner" },

    { source: "atreus", target: "agamemnon", type: "parent" },
    { source: "aerope", target: "agamemnon", type: "parent" },
    { source: "atreus", target: "menelaus", type: "parent" },
    { source: "aerope", target: "menelaus", type: "parent" },

    { source: "thyestes", target: "aegisthus", type: "parent" },
    { source: "pelopia", target: "aegisthus", type: "parent" },

    { source: "menelaus", target: "helen", type: "partner" },

    { source: "agamemnon", target: "clytemnestra", type: "partner" },

    { source: "agamemnon", target: "orestes", type: "parent" },
    { source: "clytemnestra", target: "orestes", type: "parent" },
    { source: "agamemnon", target: "electra", type: "parent" },
    { source: "clytemnestra", target: "electra", type: "parent" },

    { source: "menelaus", target: "hermione", type: "parent" },
    { source: "helen", target: "hermione", type: "parent" }
  ]
};

const REL_LABEL = {
  parent: "parent / child",
  child: "child / parent",
  partner: "partner",
  sibling: "sibling",
  half: "partial sibling line"
};

const STARS = [];
const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const panel = document.getElementById("panel");

const nodePalette = ["#7ee4d2", "#75b8ff", "#f4ce73", "#ff9eb2", "#c8b0ff", "#8d72ff", "#89d8ff"];

const byId = {};
const nodes = DATA.people.map((person) => {
  const node = { ...person, x: 0, y: 0, vx: 0, vy: 0, r: 23 };
  byId[node.id] = node;
  return node;
});

const directLinks = DATA.links
  .filter(link => byId[link.source] && byId[link.target])
  .map(link => ({
    source: byId[link.source],
    target: byId[link.target],
    type: link.type
  }));

positionNodesByGeneration();
const siblingLinks = deriveSiblingLinks();
const visualLinks = [...directLinks, ...siblingLinks];

let W = 0;
let H = 0;
let DPR = Math.max(1, window.devicePixelRatio || 1);

let view = { x: 0, y: 0, k: 1 };
let targetView = { x: 0, y: 0, k: 1 };

let selected = null;
let hover = null;
let query = "";
let dragNode = null;
let panning = false;
let moved = false;
let last = { x: 0, y: 0 };
let firstFitDone = false;
let physicsFrozen = false;

function positionNodesByGeneration() {
  const groups = new Map();

  for (const node of nodes) {
    if (!groups.has(node.gen)) groups.set(node.gen, []);
    groups.get(node.gen).push(node);
  }

  for (const [gen, group] of groups.entries()) {
    group.forEach((node, index) => {
      const spread = 170;
      node.x = (index - (group.length - 1) / 2) * spread;
      node.y = (gen - 2.2) * 140;
    });
  }

  if (byId.agamemnon) byId.agamemnon.x -= 50;
  if (byId.menelaus) byId.menelaus.x += 50;
  if (byId.aegisthus) byId.aegisthus.x -= 130;
  if (byId.helen) byId.helen.x += 120;
  if (byId.hermione) byId.hermione.x += 120;
  if (byId.clytemnestra) byId.clytemnestra.x -= 60;
}

function parentsOf(node) {
  return directLinks
    .filter(link => link.type === "parent" && link.target === node)
    .map(link => link.source);
}

function childrenOf(node) {
  return directLinks
    .filter(link => link.type === "parent" && link.source === node)
    .map(link => link.target);
}

function partnersOf(node) {
  return directLinks
    .filter(link => link.type === "partner" && (link.source === node || link.target === node))
    .map(link => link.source === node ? link.target : link.source);
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const ids = new Set(a.map(node => node.id));
  return b.every(node => ids.has(node.id));
}

function sharedParents(a, b) {
  const aParents = parentsOf(a);
  const bParents = parentsOf(b);
  const bIds = new Set(bParents.map(node => node.id));
  return aParents.filter(parent => bIds.has(parent.id));
}

function deriveSiblingLinks() {
  const links = [];

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const shared = sharedParents(a, b);

      if (!shared.length) continue;

      const aParents = parentsOf(a);
      const bParents = parentsOf(b);
      const type = sameSet(aParents, bParents) ? "sibling" : "half";
      links.push({ source: a, target: b, type });
    }
  }

  return links;
}

function relationsOf(node) {
  const out = [];

  for (const parent of parentsOf(node)) out.push({ other: parent, type: "parent" });
  for (const child of childrenOf(node)) out.push({ other: child, type: "child" });
  for (const partner of partnersOf(node)) out.push({ other: partner, type: "partner" });

  for (const link of siblingLinks) {
    if (link.source === node) out.push({ other: link.target, type: link.type });
    if (link.target === node) out.push({ other: link.source, type: link.type });
  }

  return out;
}

function makeStars() {
  STARS.length = 0;
  const count = Math.max(90, Math.floor((W * H) / 14000));

  for (let i = 0; i < count; i++) {
    STARS.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      a: Math.random() * 0.65 + 0.15
    });
  }
}

function resize() {
  const rect = cv.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  DPR = Math.max(1, window.devicePixelRatio || 1);

  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  makeStars();

  if (!firstFitDone) {
    fitToGraph(true);
    firstFitDone = true;
  } else {
    fitToGraph(true);
  }
}

window.addEventListener("resize", resize);

function fitToGraph(immediate = false) {
  let minX = Infinity;
  let minY = Infinity;
  let maxX = -Infinity;
  let maxY = -Infinity;

  for (const node of nodes) {
    minX = Math.min(minX, node.x - node.r - 28);
    maxX = Math.max(maxX, node.x + node.r + 28);
    minY = Math.min(minY, node.y - node.r - 28);
    maxY = Math.max(maxY, node.y + node.r + 34);
  }

  const graphW = Math.max(1, maxX - minX);
  const graphH = Math.max(1, maxY - minY);
  const padding = Math.min(110, Math.max(44, Math.min(W, H) * 0.09));

  const k = clamp(
    Math.min((W - padding * 2) / graphW, (H - padding * 2) / graphH),
    0.36,
    1.18
  );

  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;

  const next = {
    x: W / 2 - cx * k,
    y: H / 2 - cy * k,
    k
  };

  targetView = { ...next };

  if (immediate) view = { ...next };
}

function flyToNode(node, preferredZoom = null) {
  const k = preferredZoom || clamp(Math.max(view.k, 0.9), 0.72, 1.35);
  targetView = {
    x: W / 2 - node.x * k,
    y: H / 2 - node.y * k,
    k
  };
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function tickPhysics() {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d2 = dx * dx + dy * dy || 0.01;
      let d = Math.sqrt(d2);
      let force = 2400 / d2;
      let ux = dx / d;
      let uy = dy / d;

      a.vx -= ux * force;
      a.vy -= uy * force;
      b.vx += ux * force;
      b.vy += uy * force;
    }
  }

  for (const link of visualLinks) {
    const a = link.source;
    const b = link.target;
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    let rest =
      link.type === "partner" ? 96 :
      link.type === "sibling" ? 144 :
      link.type === "half" ? 160 : 118;
    let stiffness =
      link.type === "half" ? 0.008 :
      link.type === "sibling" ? 0.011 : 0.021;
    let force = (d - rest) * stiffness;
    let ux = dx / d;
    let uy = dy / d;

    a.vx += ux * force;
    a.vy += uy * force;
    b.vx -= ux * force;
    b.vy -= uy * force;
  }

  for (const node of nodes) {
    const targetY = (node.gen - 2.2) * 140;
    node.vy += (targetY - node.y) * 0.0033;
    node.vx += (0 - node.x) * 0.0018;

    if (node !== dragNode) {
      node.vx *= 0.87;
      node.vy *= 0.87;
      node.x += node.vx;
      node.y += node.vy;
    }
  }
}

function tickView() {
  view.x += (targetView.x - view.x) * 0.14;
  view.y += (targetView.y - view.y) * 0.14;
  view.k += (targetView.k - view.k) * 0.16;
}

function drawBackground() {
  for (const star of STARS) {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(235, 241, 255, ${star.a})`;
    ctx.fill();
  }
}

function relationColor(type) {
  if (type === "parent") return "rgba(105, 166, 255, 0.78)";
  if (type === "partner") return "rgba(244, 206, 115, 0.72)";
  if (type === "sibling") return "rgba(126, 228, 210, 0.58)";
  if (type === "half") return "rgba(162, 123, 255, 0.72)";
  return "rgba(150, 170, 220, 0.45)";
}

function matches(node) {
  return query && (
    node.name.toLowerCase().includes(query) ||
    node.role.toLowerCase().includes(query) ||
    node.note.toLowerCase().includes(query)
  );
}

function initials(name) {
  return name
    .split(/\s+/)
    .map(part => part[0])
    .join("")
    .slice(0, 2)
    .toUpperCase();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.k, view.k);

  for (const link of visualLinks) {
    const dim = query && !matches(link.source) && !matches(link.target);

    ctx.beginPath();
    ctx.moveTo(link.source.x, link.source.y);
    ctx.lineTo(link.target.x, link.target.y);

    ctx.strokeStyle = relationColor(link.type);
    ctx.lineWidth = link.type === "half" ? 2.2 : link.type === "partner" ? 1.8 : 1.6;
    ctx.globalAlpha = dim ? 0.08 : link.type === "half" ? 0.46 : 0.62;

    if (link.type === "half") ctx.setLineDash([5, 8]);
    else if (link.type === "sibling") ctx.setLineDash([2, 9]);
    else ctx.setLineDash([]);

    ctx.shadowBlur = link.type === "partner" ? 10 : 16;
    ctx.shadowColor = relationColor(link.type);
    ctx.stroke();
  }

  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  for (const node of nodes) {
    const dim = query && !matches(node);
    const fill = nodePalette[node.gen % nodePalette.length];

    ctx.globalAlpha = dim ? 0.18 : 1;

    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r + 8, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(124, 92, 255, 0.08)";
    ctx.shadowBlur = node === selected ? 34 : 20;
    ctx.shadowColor = node === selected ? "rgba(124, 92, 255, 0.42)" : fill;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();

    ctx.lineWidth = node === selected ? 3 : node === hover ? 2.4 : 1.2;
    ctx.strokeStyle = node === selected ? "#ffffff" : "rgba(255,255,255,0.18)";
    ctx.stroke();

    ctx.shadowBlur = 0;

    ctx.fillStyle = "#0c1020";
    ctx.font = "700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(initials(node.name), node.x, node.y);

    ctx.fillStyle = "#edf2ff";
    ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textBaseline = "top";
    ctx.fillText(node.name, node.x, node.y + node.r + 6);
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function loop() {
  if (!physicsFrozen) tickPhysics();
  tickView();
  draw();
  requestAnimationFrame(loop);
}

function pointFromEvent(event) {
  const rect = cv.getBoundingClientRect();
  return {
    x: event.clientX - rect.left,
    y: event.clientY - rect.top
  };
}

function toWorld(x, y, useTarget = false) {
  const v = useTarget ? targetView : view;
  return {
    x: (x - v.x) / v.k,
    y: (y - v.y) / v.k
  };
}

function pick(x, y) {
  const world = toWorld(x, y);

  for (let i = nodes.length - 1; i >= 0; i--) {
    const node = nodes[i];
    const dx = world.x - node.x;
    const dy = world.y - node.y;
    if (dx * dx + dy * dy <= node.r * node.r) return node;
  }

  return null;
}

cv.addEventListener("pointerdown", (event) => {
  const p = pointFromEvent(event);
  const node = pick(p.x, p.y);

  moved = false;
  cv.setPointerCapture(event.pointerId);

  if (node) {
    dragNode = node;
    cv.classList.add("dragging");
  } else {
    panning = true;
    last = p;
    cv.classList.add("dragging");
  }
});

cv.addEventListener("pointermove", (event) => {
  const p = pointFromEvent(event);

  if (dragNode) {
    const world = toWorld(p.x, p.y);
    dragNode.x = world.x;
    dragNode.y = world.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
    moved = true;
    return;
  }

  if (panning) {
    const dx = p.x - last.x;
    const dy = p.y - last.y;
    view.x += dx;
    view.y += dy;
    targetView.x += dx;
    targetView.y += dy;
    last = p;
    moved = true;
    return;
  }

  hover = pick(p.x, p.y);
  cv.style.cursor = hover ? "pointer" : "grab";
});

cv.addEventListener("pointerup", (event) => {
  const p = pointFromEvent(event);

  if (dragNode && !moved) {
    select(dragNode);
  } else if (!dragNode && !panning && !moved) {
    select(pick(p.x, p.y));
  }

  dragNode = null;
  panning = false;
  cv.classList.remove("dragging");
});

cv.addEventListener("wheel", (event) => {
  event.preventDefault();

  const zoomFactor = Math.exp(-event.deltaY * 0.0012);
  const nextK = clamp(targetView.k * zoomFactor, 0.32, 2.2);

  const world = toWorld(event.offsetX, event.offsetY, true);
  targetView.k = nextK;
  targetView.x = event.offsetX - world.x * targetView.k;
  targetView.y = event.offsetY - world.y * targetView.k;
}, { passive: false });

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function select(node) {
  selected = node;

  if (!node) {
    panel.innerHTML = `
      <div class="eyebrow">Mythic demo data</div>
      <p class="empty">Click any star in the map to inspect its role, notes, and visible connections.</p>
    `;
    return;
  }

  const relations = relationsOf(node);
  const relationHtml = relations.length
    ? relations.map(relation => {
        const color = relationColor(relation.type);
        return `
          <div class="rel" data-id="${escapeHtml(relation.other.id)}">
            <span class="dot" style="background:${color}"></span>
            <span>${escapeHtml(relation.other.name)}</span>
            <small>${escapeHtml(REL_LABEL[relation.type] || relation.type)}</small>
          </div>
        `;
      }).join("")
    : '<div class="empty">No recorded connections.</div>';

  panel.innerHTML = `
    <div class="eyebrow">Mythic demo data</div>
    <h2 class="person-name">${escapeHtml(node.name)}</h2>
    <div class="person-meta">generation ${escapeHtml(node.gen)} · ${escapeHtml(node.role)}</div>

    <div class="field">
      <b>Note</b>
      ${escapeHtml(node.note)}
    </div>

    <div class="field">
      <b>Connections</b>
      <div class="rels">${relationHtml}</div>
    </div>

    <div class="legend">
      <h3>Relationship lines</h3>
      <div class="leg-row"><span class="dot" style="background:${relationColor("parent")}"></span>parent / child</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor("partner")}"></span>partner</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor("sibling")}"></span>sibling</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor("half")}"></span>partial sibling line</div>
    </div>
  `;

  panel.querySelectorAll(".rel").forEach(element => {
    element.addEventListener("click", () => {
      const target = byId[element.dataset.id];
      if (!target) return;
      select(target);
      flyToNode(target, clamp(view.k * 1.04, 0.82, 1.28));
    });
  });

  flyToNode(node, clamp(view.k * 1.03, 0.82, 1.22));
}

document.getElementById("search").addEventListener("input", (event) => {
  query = event.target.value.trim().toLowerCase();
});

document.getElementById("reset").addEventListener("click", () => {
  fitToGraph(false);
});

document.getElementById("freeze").addEventListener("click", (event) => {
  physicsFrozen = !physicsFrozen;
  event.currentTarget.classList.toggle("active", physicsFrozen);
  event.currentTarget.textContent = physicsFrozen ? "Unfreeze" : "Freeze";
});

resize();
loop();
</script>
</body>
</html>
