<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fam Star Map</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #151a23;
    --panel-2: #0c1018;
    --line: #222a37;
    --ink: #e7ecf3;
    --muted: #8a97ab;
    --accent: #6ea8fe;
    --accent-2: #ffd479;

    --g0: #6ea8fe;
    --g1: #7ee0c9;
    --g2: #ffd479;
    --g3: #ff9aa2;
    --g4: #c8a8ff;

    --rel-parent: #3f5d8a;
    --rel-partner: #b9893f;
    --rel-half: #8a5cc0;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  #app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 56px 1fr;
    height: 100%;
  }

  header {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 16px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }

  header h1 {
    font-size: 15px;
    margin: 0;
    letter-spacing: 0.3px;
    font-weight: 650;
  }

  header h1 span {
    color: var(--accent);
  }

  .tag {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  #search {
    margin-left: auto;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 12px;
    border-radius: 8px;
    width: 220px;
    outline: none;
  }

  #search:focus {
    border-color: var(--accent);
  }

  .btn {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }

  .btn:hover {
    color: var(--ink);
    border-color: var(--accent);
  }

  #stage {
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }

  canvas.dragging {
    cursor: grabbing;
  }

  aside {
    background: var(--panel);
    border-left: 1px solid var(--line);
    padding: 18px;
    overflow: auto;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
  }

  .person-name {
    font-size: 20px;
    font-weight: 650;
    margin: 0 0 2px;
  }

  .person-meta {
    color: var(--muted);
    font-size: 12.5px;
    margin-bottom: 14px;
  }

  .field {
    margin-bottom: 12px;
  }

  .field b {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .rels {
    margin-top: 6px;
  }

  .rel {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 7px;
    cursor: pointer;
    margin-bottom: 3px;
  }

  .rel:hover {
    background: var(--panel-2);
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 auto;
  }

  .rel small {
    color: var(--muted);
    margin-left: auto;
    text-align: right;
  }

  .legend {
    margin-top: 22px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }

  .legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin: 0 0 8px;
  }

  .leg-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--muted);
  }

  .hint {
    position: absolute;
    bottom: 12px;
    left: 14px;
    color: var(--muted);
    font-size: 11px;
    background: rgba(13, 15, 20, 0.72);
    padding: 6px 10px;
    border-radius: 6px;
    pointer-events: none;
  }

  @media (max-width: 760px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto minmax(420px, 1fr) 280px;
    }

    header {
      grid-column: 1;
      flex-wrap: wrap;
      height: auto;
      padding: 12px;
    }

    #search {
      width: 100%;
      margin-left: 0;
    }

    aside {
      border-left: 0;
      border-top: 1px solid var(--line);
    }
  }
</style>
</head>

<body>
<div id="app">
  <header>
    <h1><span>✦</span> Fam Star Map</h1>
    <span class="tag">fictional kinship map · demo data</span>
    <input id="search" placeholder="Search a node…" autocomplete="off" />
    <button class="btn" id="reset">Re-center</button>
  </header>

  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">drag nodes · scroll to zoom · click to inspect</div>
  </div>

  <aside id="panel">
    <p class="empty">Click any node in the map to inspect its role, notes, and visible connections.</p>
  </aside>
</div>

<script>
const DATA = {
  people: [
    {
      id: "root-a",
      name: "Root Star A",
      gen: 0,
      role: "Origin node",
      note: "One of two starting points in the visible record."
    },
    {
      id: "root-b",
      name: "Root Star B",
      gen: 0,
      role: "Origin node",
      note: "Paired with Root Star A to form the first visible branch."
    },
    {
      id: "branch-a",
      name: "Primary Branch",
      gen: 1,
      role: "Known branch",
      note: "A well-recorded descendant line with several visible child nodes."
    },
    {
      id: "branch-b",
      name: "Side Branch",
      gen: 1,
      role: "Known branch",
      note: "A parallel branch used to show how nearby records can remain structurally separate."
    },
    {
      id: "partner-a",
      name: "Companion Node",
      gen: 1,
      role: "Partner node",
      note: "Primary partner connection for the known line."
    },
    {
      id: "prior-link",
      name: "Earlier Link",
      gen: 1,
      role: "Partial partner node",
      note: "A partial relationship record. Useful for testing hidden or rediscovered branches."
    },
    {
      id: "known-1",
      name: "Known Line 1",
      gen: 2,
      role: "Descendant node",
      note: "A standard visible descendant in the primary branch."
    },
    {
      id: "known-2",
      name: "Known Line 2",
      gen: 2,
      role: "Descendant node",
      note: "Another visible descendant in the primary branch."
    },
    {
      id: "search-origin",
      name: "Search-Origin Node",
      gen: 2,
      role: "Inspector node",
      note: "The point of view node: the one used to inspect how branches become visible."
    },
    {
      id: "late-signal",
      name: "Late Signal",
      gen: 2,
      role: "Rediscovered node",
      note: "A branch that appears later through a partial record, search result, or outside signal."
    },
    {
      id: "partial-record",
      name: "Partial Record",
      gen: 2,
      role: "Incomplete node",
      note: "A deliberately incomplete node with only one recorded parent link."
    }
  ],

  links: [
    { source: "root-a", target: "root-b", type: "partner" },

    { source: "root-a", target: "branch-a", type: "parent" },
    { source: "root-b", target: "branch-a", type: "parent" },
    { source: "root-a", target: "branch-b", type: "parent" },
    { source: "root-b", target: "branch-b", type: "parent" },

    { source: "branch-a", target: "partner-a", type: "partner" },
    { source: "branch-a", target: "prior-link", type: "partner" },

    { source: "branch-a", target: "known-1", type: "parent" },
    { source: "partner-a", target: "known-1", type: "parent" },

    { source: "branch-a", target: "known-2", type: "parent" },
    { source: "partner-a", target: "known-2", type: "parent" },

    { source: "branch-a", target: "search-origin", type: "parent" },
    { source: "partner-a", target: "search-origin", type: "parent" },

    { source: "branch-a", target: "late-signal", type: "parent" },
    { source: "prior-link", target: "late-signal", type: "parent" },

    { source: "branch-b", target: "partial-record", type: "parent" }
  ]
};

const root = document.documentElement;
const css = getComputedStyle(root);

const GEN_COLORS = ["--g0", "--g1", "--g2", "--g3", "--g4"]
  .map(name => css.getPropertyValue(name).trim());

const REL_COLORS = {
  parent: css.getPropertyValue("--rel-parent").trim(),
  partner: css.getPropertyValue("--rel-partner").trim(),
  half: css.getPropertyValue("--rel-half").trim()
};

const REL_LABEL = {
  parent: "parent / child",
  child: "child / parent",
  partner: "partner",
  sibling: "sibling",
  half: "partial sibling line"
};

const byId = {};
const nodes = DATA.people.map(person => {
  const node = { ...person, x: 0, y: 0, vx: 0, vy: 0, r: 22 };
  byId[node.id] = node;
  return node;
});

const directLinks = DATA.links
  .filter(link => byId[link.source] && byId[link.target])
  .map(link => ({
    source: byId[link.source],
    target: byId[link.target],
    type: link.type
  }));

positionNodesByGeneration();

const halfSiblingLinks = deriveSiblingLinks().filter(link => link.type === "half");
const visualLinks = [...directLinks, ...halfSiblingLinks];

const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const panel = document.getElementById("panel");

let W = 0;
let H = 0;
let DPR = Math.max(1, window.devicePixelRatio || 1);
let view = { x: 0, y: 0, k: 1 };
let selected = null;
let hover = null;
let query = "";
let dragNode = null;
let panning = false;
let last = { x: 0, y: 0 };
let moved = false;

function positionNodesByGeneration() {
  const groups = new Map();

  for (const node of nodes) {
    if (!groups.has(node.gen)) groups.set(node.gen, []);
    groups.get(node.gen).push(node);
  }

  for (const [gen, group] of groups.entries()) {
    group.forEach((node, index) => {
      node.x = (index - (group.length - 1) / 2) * 155;
      node.y = (gen - 1.3) * 135;
    });
  }
}

function parentsOf(node) {
  return directLinks
    .filter(link => link.type === "parent" && link.target === node)
    .map(link => link.source);
}

function childrenOf(node) {
  return directLinks
    .filter(link => link.type === "parent" && link.source === node)
    .map(link => link.target);
}

function partnersOf(node) {
  return directLinks
    .filter(link => link.type === "partner" && (link.source === node || link.target === node))
    .map(link => link.source === node ? link.target : link.source);
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const ids = new Set(a.map(node => node.id));
  return b.every(node => ids.has(node.id));
}

function sharedParents(a, b) {
  const aParents = parentsOf(a);
  const bParents = parentsOf(b);
  const bIds = new Set(bParents.map(node => node.id));
  return aParents.filter(parent => bIds.has(parent.id));
}

function deriveSiblingLinks() {
  const links = [];

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const shared = sharedParents(a, b);

      if (!shared.length) continue;

      const aParents = parentsOf(a);
      const bParents = parentsOf(b);
      const type = sameSet(aParents, bParents) ? "sibling" : "half";

      links.push({ source: a, target: b, type });
    }
  }

  return links;
}

function relationsOf(node) {
  const out = [];

  for (const parent of parentsOf(node)) {
    out.push({ other: parent, type: "parent" });
  }

  for (const child of childrenOf(node)) {
    out.push({ other: child, type: "child" });
  }

  for (const partner of partnersOf(node)) {
    out.push({ other: partner, type: "partner" });
  }

  for (const link of deriveSiblingLinks()) {
    if (link.source === node) out.push({ other: link.target, type: link.type });
    if (link.target === node) out.push({ other: link.source, type: link.type });
  }

  return out;
}

function resize() {
  const rect = cv.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  view.x = W / 2;
  view.y = H / 2;
}

window.addEventListener("resize", resize);

function tick() {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d2 = dx * dx + dy * dy || 0.01;
      let d = Math.sqrt(d2);
      let force = 2600 / d2;
      let ux = dx / d;
      let uy = dy / d;

      a.vx -= ux * force;
      a.vy -= uy * force;
      b.vx += ux * force;
      b.vy += uy * force;
    }
  }

  for (const link of visualLinks) {
    const a = link.source;
    const b = link.target;
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    let rest = link.type === "partner" ? 78 : link.type === "half" ? 145 : 118;
    let stiffness = link.type === "half" ? 0.008 : 0.022;
    let force = (d - rest) * stiffness;
    let ux = dx / d;
    let uy = dy / d;

    a.vx += ux * force;
    a.vy += uy * force;
    b.vx -= ux * force;
    b.vy -= uy * force;
  }

  for (const node of nodes) {
    const targetY = (node.gen - 1.3) * 135;
    node.vy += (targetY - node.y) * 0.004;
    node.vx += (0 - node.x) * 0.002;

    if (node !== dragNode) {
      node.vx *= 0.86;
      node.vy *= 0.86;
      node.x += node.vx;
      node.y += node.vy;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.k, view.k);

  for (const link of visualLinks) {
    const dim = query && !matches(link.source) && !matches(link.target);

    ctx.beginPath();
    ctx.moveTo(link.source.x, link.source.y);
    ctx.lineTo(link.target.x, link.target.y);

    ctx.strokeStyle = REL_COLORS[link.type] || "#3a4557";
    ctx.lineWidth = link.type === "half" ? 2.1 : 1.6;
    ctx.globalAlpha = dim ? 0.1 : link.type === "half" ? 0.55 : 0.68;

    if (link.type === "half") ctx.setLineDash([5, 5]);
    else ctx.setLineDash([]);

    ctx.stroke();
  }

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  for (const node of nodes) {
    const dim = query && !matches(node);
    const color = GEN_COLORS[node.gen % GEN_COLORS.length];

    ctx.globalAlpha = dim ? 0.16 : 1;

    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    if (node === selected || node === hover) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#ffffff";
      ctx.stroke();
    }

    ctx.fillStyle = "#0d0f14";
    ctx.font = "650 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(initials(node.name), node.x, node.y);

    ctx.fillStyle = css.getPropertyValue("--ink").trim();
    ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textBaseline = "top";
    ctx.fillText(node.name, node.x, node.y + node.r + 5);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function initials(name) {
  return name
    .split(/\s+/)
    .map(word => word[0])
    .join("")
    .slice(0, 2)
    .toUpperCase();
}

function matches(node) {
  return query && (
    node.name.toLowerCase().includes(query) ||
    node.role.toLowerCase().includes(query) ||
    node.note.toLowerCase().includes(query)
  );
}

function loop() {
  tick();
  draw();
  requestAnimationFrame(loop);
}

function pointFromEvent(event) {
  const rect = cv.getBoundingClientRect();
  return {
    x: event.clientX - rect.left,
    y: event.clientY - rect.top
  };
}

function toWorld(x, y) {
  return {
    x: (x - view.x) / view.k,
    y: (y - view.y) / view.k
  };
}

function pick(x, y) {
  const world = toWorld(x, y);

  for (let i = nodes.length - 1; i >= 0; i--) {
    const node = nodes[i];
    const dx = world.x - node.x;
    const dy = world.y - node.y;

    if (dx * dx + dy * dy <= node.r * node.r) return node;
  }

  return null;
}

cv.addEventListener("pointerdown", event => {
  const p = pointFromEvent(event);
  const node = pick(p.x, p.y);

  moved = false;
  cv.setPointerCapture(event.pointerId);

  if (node) {
    dragNode = node;
    cv.classList.add("dragging");
  } else {
    panning = true;
    last = p;
    cv.classList.add("dragging");
  }
});

cv.addEventListener("pointermove", event => {
  const p = pointFromEvent(event);

  if (dragNode) {
    const world = toWorld(p.x, p.y);
    dragNode.x = world.x;
    dragNode.y = world.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
    moved = true;
    return;
  }

  if (panning) {
    view.x += p.x - last.x;
    view.y += p.y - last.y;
    last = p;
    moved = true;
    return;
  }

  hover = pick(p.x, p.y);
  cv.style.cursor = hover ? "pointer" : "grab";
});

cv.addEventListener("pointerup", event => {
  const p = pointFromEvent(event);

  if (dragNode && !moved) {
    select(dragNode);
  } else if (!dragNode && !panning && !moved) {
    select(pick(p.x, p.y));
  }

  dragNode = null;
  panning = false;
  cv.classList.remove("dragging");
});

cv.addEventListener("wheel", event => {
  event.preventDefault();

  const zoom = event.deltaY < 0 ? 1.1 : 0.9;
  const wx = (event.offsetX - view.x) / view.k;
  const wy = (event.offsetY - view.y) / view.k;

  view.k = Math.min(3, Math.max(0.35, view.k * zoom));
  view.x = event.offsetX - wx * view.k;
  view.y = event.offsetY - wy * view.k;
}, { passive: false });

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function select(node) {
  selected = node;

  if (!node) {
    panel.innerHTML = '<p class="empty">Click any node in the map to inspect its role, notes, and visible connections.</p>';
    return;
  }

  const relations = relationsOf(node);
  const relationHtml = relations.length
    ? relations.map(relation => {
        const color = REL_COLORS[relation.type] || REL_COLORS.parent;
        return `
          <div class="rel" data-id="${escapeHtml(relation.other.id)}">
            <span class="dot" style="background:${color}"></span>
            <span>${escapeHtml(relation.other.name)}</span>
            <small>${escapeHtml(REL_LABEL[relation.type] || relation.type)}</small>
          </div>
        `;
      }).join("")
    : '<div class="empty">No recorded connections.</div>';

  panel.innerHTML = `
    <h2 class="person-name">${escapeHtml(node.name)}</h2>
    <div class="person-meta">generation ${escapeHtml(node.gen)} · ${escapeHtml(node.role)}</div>

    <div class="field">
      <b>Note</b>
      ${escapeHtml(node.note)}
    </div>

    <div class="field">
      <b>Connections</b>
      <div class="rels">${relationHtml}</div>
    </div>

    <div class="legend">
      <h3>Relationship lines</h3>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.parent}"></span>parent / child</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.partner}"></span>partner</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.half}"></span>partial sibling line</div>
    </div>
  `;

  panel.querySelectorAll(".rel").forEach(element => {
    element.addEventListener("click", () => {
      const target = byId[element.dataset.id];

      if (!target) return;

      select(target);
      view.x = W / 2 - target.x * view.k;
      view.y = H / 2 - target.y * view.k;
    });
  });
}

document.getElementById("search").addEventListener("input", event => {
  query = event.target.value.trim().toLowerCase();
});

document.getElementById("reset").addEventListener("click", () => {
  view.x = W / 2;
  view.y = H / 2;
  view.k = 1;
});

resize();
loop();
</script>
</body>
</html>
