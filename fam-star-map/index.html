<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fam Star Map</title>
  <style>
    /*
      This file implements a flagship demo of the Fam Star Map for the
      House of Atreus dataset. It keeps the dark/violet/gold palette,
      starfield and spring physics from previous iterations, but improves
      the mobile experience by introducing a floating bottom sheet on
      small screens. The bottom sheet displays selected node details and
      related chips, allowing for tap‑to‑traverse storytelling without
      scrolling away from the constellation. On wider screens the
      inspector remains in a right‑hand panel as before.  The entire
      application is self contained in this single HTML file and is
      suitable for deployment on GitHub Pages.
    */

    :root {
      /* colour palette for stars and UI */
      --bg: #090d17;
      --bg-2: #0e1526;
      --panel: rgba(12, 18, 34, 0.92);
      --panel-2: rgba(10, 15, 28, 0.94);
      --line: rgba(108, 133, 204, 0.22);
      --ink: #eef3ff;
      --muted: #9ca8c4;

      --accent: #7c5cff;
      --accent-soft: rgba(124, 92, 255, 0.24);
      --accent-soft-2: rgba(124, 92, 255, 0.12);
      --gold: #f4ce73;
      --teal: #7ee4d2;
      --rose: #ff9eb2;
      --lav: #c8b0ff;
      --blue: #77b4ff;

      /* relationship line colours */
      --rel-parent: rgba(105, 166, 255, 0.78);
      --rel-partner: rgba(244, 206, 115, 0.72);
      --rel-sibling: rgba(126, 228, 210, 0.62);
      --rel-half: rgba(162, 123, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at 20% 0%, rgba(68, 102, 194, 0.18), transparent 34%),
        radial-gradient(circle at 85% 18%, rgba(124, 92, 255, 0.14), transparent 28%),
        linear-gradient(180deg, #0b1120 0%, #090d17 100%);
      color: var(--ink);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    header {
      grid-column: 1 / 3;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(17, 25, 46, 0.92), rgba(12, 18, 34, 0.92));
      backdrop-filter: blur(14px);
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 .spark {
      color: var(--gold);
      filter: drop-shadow(0 0 10px rgba(244, 206, 115, 0.3));
    }

    .tag {
      color: var(--muted);
      border: 1px solid var(--line);
      background: rgba(124, 92, 255, 0.08);
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      white-space: nowrap;
    }

    .controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    #search {
      width: 280px;
      max-width: 36vw;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(124, 92, 255, 0.22);
      background: rgba(7, 11, 20, 0.78);
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    #search::placeholder {
      color: #7f8ca9;
    }

    #search:focus {
      border-color: rgba(124, 92, 255, 0.5);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.14);
    }

    .btn {
      border: 1px solid rgba(124, 92, 255, 0.28);
      background: rgba(9, 13, 23, 0.86);
      color: var(--ink);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 13px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 92, 255, 0.48);
      background: rgba(15, 21, 38, 0.94);
    }

    .btn.active {
      background: linear-gradient(180deg, rgba(124, 92, 255, 0.26), rgba(124, 92, 255, 0.18));
      border-color: rgba(124, 92, 255, 0.54);
    }

    #stage {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(95, 121, 191, 0.16), transparent 36%),
        radial-gradient(circle at 20% 15%, rgba(124, 92, 255, 0.11), transparent 24%),
        linear-gradient(180deg, #0b1120 0%, #0a1020 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(6, 9, 17, 0.6);
      border: 1px solid rgba(124, 92, 255, 0.14);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    aside#panel {
      border-left: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 18, 34, 0.95), rgba(10, 15, 29, 0.95));
      backdrop-filter: blur(16px);
      padding: 18px;
      overflow: auto;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .person-name {
      margin: 0 0 2px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .person-meta {
      color: var(--muted);
      font-size: 12.5px;
      margin-bottom: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field b {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .rels {
      margin-top: 6px;
    }

    .rel {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 120ms ease;
    }

    .rel:hover {
      background: rgba(124, 92, 255, 0.08);
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .rel small {
      color: var(--muted);
      margin-left: auto;
      text-align: right;
    }

    .legend {
      margin-top: 22px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .legend h3 {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 10px;
    }

    .leg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* bottom sheet for mobile */
    #sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(12, 18, 34, 0.95), rgba(10, 15, 29, 0.95));
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.4);
      transform: translateY(100%);
      transition: transform 300ms ease;
      padding: 18px;
      z-index: 11;
    }

    #sheet.show {
      transform: translateY(0);
    }

    #sheet .eyebrow {
      margin-bottom: 12px;
    }

    #sheet .person-name {
      font-size: 20px;
    }

    #sheet .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    #sheet .chip {
      border: 1px solid rgba(124, 92, 255, 0.28);
      background: rgba(9, 13, 23, 0.84);
      color: var(--ink);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }

    #sheet .chip:hover {
      border-color: rgba(124, 92, 255, 0.48);
      background: rgba(15, 21, 38, 0.94);
    }

    #sheet .trail {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #sheet .trail span {
      color: var(--ink);
    }

    /* responsive layout adjustments */
    @media (max-width: 980px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(56vh, 1fr);
      }
      header {
        grid-column: 1;
        flex-wrap: wrap;
        align-items: stretch;
      }
      .controls {
        width: 100%;
        margin-left: 0;
        flex-wrap: wrap;
      }
      #search {
        width: 100%;
        max-width: none;
      }
      aside#panel {
        display: none;
      }
      /* safe area for mobile bottom sheet */
      #sheet {
        padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
      }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="spark">✦</span> Fam Star Map</h1>
    <span class="tag">House of Atreus · mythic demo</span>
    <div class="controls">
      <input id="search" type="text" placeholder="Search the constellation…" autocomplete="off" />
      <button class="btn" id="zoomOut">−</button>
      <button class="btn" id="zoomIn">+</button>
      <button class="btn" id="freeze">Freeze</button>
      <button class="btn" id="fit">Fit</button>
    </div>
  </header>
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">drag stars · scroll to zoom · tap to inspect · chips navigate</div>
  </div>
  <aside id="panel">
    <div class="eyebrow">Mythic demo data</div>
    <p class="empty">Tap a star to explore its connections.</p>
  </aside>
  <div id="sheet"></div>
</div>
<script>
// Data for the House of Atreus.
const DATA = {
  people: [
    { id: "tantalus", name: "Tantalus", gen: 0, role: "Origin node", note: "Mythic origin point of the cursed line." },
    { id: "pelops", name: "Pelops", gen: 1, role: "Dynastic node", note: "Central ancestor whose descendants define the House of Atreus." },
    { id: "hippodamia", name: "Hippodamia", gen: 1, role: "Partner node", note: "Paired with Pelops in the founding branch." },
    { id: "atreus", name: "Atreus", gen: 2, role: "Primary branch", note: "One of the two defining brothers in the central rupture." },
    { id: "thyestes", name: "Thyestes", gen: 2, role: "Counter-branch", note: "Sibling rival to Atreus. A core fracture point in the constellation." },
    { id: "aerope", name: "Aerope", gen: 3, role: "Partner node", note: "Connected to Atreus; entangled in the line’s instability." },
    { id: "pelopia", name: "Pelopia", gen: 3, role: "Partner node", note: "Linked to Thyestes and the shadow branch below." },
    { id: "agamemnon", name: "Agamemnon", gen: 4, role: "Descendant node", note: "One of Atreus’s most famous descendants." },
    { id: "menelaus", name: "Menelaus", gen: 4, role: "Descendant node", note: "Brother of Agamemnon; another highly visible branch." },
    { id: "aegisthus", name: "Aegisthus", gen: 4, role: "Shadow descendant", note: "A destabilizing line emerging from the counter-branch." },
    { id: "helen", name: "Helen", gen: 4, role: "Partner node", note: "Paired here as the Menelaus branch’s most recognizable counterpart." },
    { id: "clytemnestra", name: "Clytemnestra", gen: 5, role: "Partner node", note: "Partner of Agamemnon and a major node in the tragic continuation." },
    { id: "orestes", name: "Orestes", gen: 6, role: "Descendant node", note: "A continuation point where the family curse remains legible." },
    { id: "electra", name: "Electra", gen: 6, role: "Descendant node", note: "Sibling branch tied tightly to the Orestes line." },
    { id: "hermione", name: "Hermione", gen: 5, role: "Descendant node", note: "A child branch extending from Menelaus and Helen." }
  ],
  links: [
    { source: "tantalus", target: "pelops", type: "parent" },
    { source: "pelops", target: "hippodamia", type: "partner" },
    { source: "pelops", target: "atreus", type: "parent" },
    { source: "hippodamia", target: "atreus", type: "parent" },
    { source: "pelops", target: "thyestes", type: "parent" },
    { source: "hippodamia", target: "thyestes", type: "parent" },
    { source: "atreus", target: "aerope", type: "partner" },
    { source: "thyestes", target: "pelopia", type: "partner" },
    { source: "atreus", target: "agamemnon", type: "parent" },
    { source: "aerope", target: "agamemnon", type: "parent" },
    { source: "atreus", target: "menelaus", type: "parent" },
    { source: "aerope", target: "menelaus", type: "parent" },
    { source: "thyestes", target: "aegisthus", type: "parent" },
    { source: "pelopia", target: "aegisthus", type: "parent" },
    { source: "menelaus", target: "helen", type: "partner" },
    { source: "agamemnon", target: "clytemnestra", type: "partner" },
    { source: "agamemnon", target: "orestes", type: "parent" },
    { source: "clytemnestra", target: "orestes", type: "parent" },
    { source: "agamemnon", target: "electra", type: "parent" },
    { source: "clytemnestra", target: "electra", type: "parent" },
    { source: "menelaus", target: "hermione", type: "parent" },
    { source: "helen", target: "hermione", type: "parent" }
  ]
};

// Relationship labels for display.
const REL_LABEL = {
  parent: "parent / child",
  child: "child / parent",
  partner: "partner",
  sibling: "sibling",
  half: "partial sibling line"
};

// Prepare graph structures.
const byId = {};
const nodes = DATA.people.map((p) => {
  const n = { ...p, x: 0, y: 0, vx: 0, vy: 0, r: 23 };
  byId[n.id] = n;
  return n;
});

// Primary (direct) links from the dataset.
const directLinks = DATA.links
  .filter((l) => byId[l.source] && byId[l.target])
  .map((l) => ({ source: byId[l.source], target: byId[l.target], type: l.type }));

// Utility functions for graph relations.
function parentsOf(node) {
  return directLinks
    .filter((l) => l.type === "parent" && l.target === node)
    .map((l) => l.source);
}

function childrenOf(node) {
  return directLinks
    .filter((l) => l.type === "parent" && l.source === node)
    .map((l) => l.target);
}

function partnersOf(node) {
  return directLinks
    .filter((l) => l.type === "partner" && (l.source === node || l.target === node))
    .map((l) => (l.source === node ? l.target : l.source));
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const ids = new Set(a.map((n) => n.id));
  return b.every((n) => ids.has(n.id));
}

function sharedParents(a, b) {
  const aParents = parentsOf(a);
  const bParents = parentsOf(b);
  const ids = new Set(bParents.map((n) => n.id));
  return aParents.filter((n) => ids.has(n.id));
}

function deriveSiblingLinks() {
  const links = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const shared = sharedParents(a, b);
      if (!shared.length) continue;
      const aParents = parentsOf(a);
      const bParents = parentsOf(b);
      const type = sameSet(aParents, bParents) ? "sibling" : "half";
      links.push({ source: a, target: b, type });
    }
  }
  return links;
}

// Derive sibling/half-sibling links.
const siblingLinks = deriveSiblingLinks();
const visualLinks = [...directLinks, ...siblingLinks];

// Starfield for ambience.
const STARS = [];

// Canvas and rendering state.
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const panel = document.getElementById('panel');
const sheet = document.getElementById('sheet');
let W = 0;
let H = 0;
let DPR = 1;

// View transforms (pan + zoom). `view` is current; `targetView` is animated towards.
let view = { x: 0, y: 0, k: 1 };
let targetView = { x: 0, y: 0, k: 1 };

// Interaction state.
let selected = null;
let hover = null;
let dragNode = null;
let panning = false;
let moved = false;
let last = { x: 0, y: 0 };
let physicsFrozen = false;
let firstFitDone = false;

// Keep a trail of selected nodes for narrative.
const selectionTrail = [];

// Utility to clamp values.
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// Position nodes by generation for initial layout. Adjust offsets manually for better composition.
function positionNodesByGeneration() {
  const groups = new Map();
  for (const n of nodes) {
    if (!groups.has(n.gen)) groups.set(n.gen, []);
    groups.get(n.gen).push(n);
  }
  for (const [gen, group] of groups.entries()) {
    group.forEach((n, i) => {
      const spread = 170;
      n.x = (i - (group.length - 1) / 2) * spread;
      n.y = (gen - 2.2) * 140;
    });
  }
  // custom offsets for key nodes for clarity
  if (byId.agamemnon) byId.agamemnon.x -= 50;
  if (byId.menelaus) byId.menelaus.x += 50;
  if (byId.aegisthus) byId.aegisthus.x -= 130;
  if (byId.helen) byId.helen.x += 120;
  if (byId.hermione) byId.hermione.x += 120;
  if (byId.clytemnestra) byId.clytemnestra.x -= 60;
}

// Initialise starfield based on canvas size.
function makeStars() {
  STARS.length = 0;
  const count = Math.max(90, Math.floor((W * H) / 14000));
  for (let i = 0; i < count; i++) {
    STARS.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      a: Math.random() * 0.65 + 0.15
    });
  }
}

// Resize canvas and perform initial fit.
function resize() {
  const rect = cv.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  DPR = Math.max(1, window.devicePixelRatio || 1);
  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  makeStars();
  if (!firstFitDone) {
    fitToGraph(true);
    firstFitDone = true;
  } else {
    fitToGraph(true);
  }
}

// Fit view to include entire graph nicely.
function fitToGraph(immediate = false) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x - n.r - 28);
    maxX = Math.max(maxX, n.x + n.r + 28);
    minY = Math.min(minY, n.y - n.r - 28);
    maxY = Math.max(maxY, n.y + n.r + 34);
  }
  const graphW = Math.max(1, maxX - minX);
  const graphH = Math.max(1, maxY - minY);
  const padding = Math.min(110, Math.max(44, Math.min(W, H) * 0.09));
  const k = clamp(Math.min((W - padding * 2) / graphW, (H - padding * 2) / graphH), 0.36, 1.18);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const next = { x: W / 2 - cx * k, y: H / 2 - cy * k, k };
  targetView = { ...next };
  if (immediate) view = { ...next };
}

// Physics tick: repulsion, springs, gentle centring.
function tickPhysics() {
  // repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d2 = dx * dx + dy * dy || 0.01;
      let d = Math.sqrt(d2);
      let f = 2400 / d2;
      let ux = dx / d;
      let uy = dy / d;
      a.vx -= ux * f;
      a.vy -= uy * f;
      b.vx += ux * f;
      b.vy += uy * f;
    }
  }
  // springs
  for (const l of visualLinks) {
    const a = l.source, b = l.target;
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    let rest = l.type === 'partner' ? 96 : l.type === 'sibling' ? 144 : l.type === 'half' ? 160 : 118;
    let stiffness = l.type === 'half' ? 0.008 : l.type === 'sibling' ? 0.011 : 0.021;
    let f = (d - rest) * stiffness;
    let ux = dx / d;
    let uy = dy / d;
    a.vx += ux * f;
    a.vy += uy * f;
    b.vx -= ux * f;
    b.vy -= uy * f;
  }
  // centring by generation and x axis
  for (const n of nodes) {
    const targetY = (n.gen - 2.2) * 140;
    n.vy += (targetY - n.y) * 0.0035;
    n.vx += (0 - n.x) * 0.0019;
    if (n !== dragNode) {
      n.vx *= 0.87;
      n.vy *= 0.87;
      n.x += n.vx;
      n.y += n.vy;
    }
  }
}

// Animate view towards target.
function tickView() {
  view.x += (targetView.x - view.x) * 0.14;
  view.y += (targetView.y - view.y) * 0.14;
  view.k += (targetView.k - view.k) * 0.16;
}

// Draw starfield in background.
function drawBackground() {
  for (const s of STARS) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(235, 241, 255, ${s.a})`;
    ctx.fill();
  }
}

// Relationship color helper.
function relationColor(type) {
  if (type === 'parent') return 'rgba(105,166,255,0.78)';
  if (type === 'partner') return 'rgba(244,206,115,0.72)';
  if (type === 'sibling') return 'rgba(126,228,210,0.62)';
  if (type === 'half') return 'rgba(162,123,255,0.72)';
  return 'rgba(150,170,220,0.45)';
}

// Determine if node matches current search query.
function matches(n) {
  return query && (
    n.name.toLowerCase().includes(query) ||
    n.role.toLowerCase().includes(query) ||
    n.note.toLowerCase().includes(query)
  );
}

// Compute initials for a node.
function initials(name) {
  return name.split(/\s+/).map((w) => w[0]).join('').slice(0, 2).toUpperCase();
}

// Render everything.
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.k, view.k);
  // draw links
  for (const l of visualLinks) {
    const dim = query && !matches(l.source) && !matches(l.target);
    ctx.beginPath();
    ctx.moveTo(l.source.x, l.source.y);
    ctx.lineTo(l.target.x, l.target.y);
    ctx.strokeStyle = relationColor(l.type);
    ctx.lineWidth = l.type === 'half' ? 2.1 : l.type === 'sibling' ? 1.8 : 1.6;
    ctx.globalAlpha = dim ? 0.08 : l.type === 'half' ? 0.52 : l.type === 'sibling' ? 0.52 : 0.68;
    if (l.type === 'half') ctx.setLineDash([5, 7]);
    else if (l.type === 'sibling') ctx.setLineDash([2, 7]);
    else ctx.setLineDash([]);
    if (selected && (l.source === selected || l.target === selected)) {
      ctx.globalAlpha = 0.85;
      ctx.lineWidth = l.type === 'half' ? 2.6 : 2.4;
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
  // draw nodes
  for (const n of nodes) {
    const dim = query && !matches(n);
    const palette = ['#7ee4d2', '#75b8ff', '#f4ce73', '#ff9eb2', '#c8b0ff', '#8d72ff', '#89d8ff'];
    const fill = palette[n.gen % palette.length];
    ctx.globalAlpha = dim ? 0.18 : 1;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r + 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(124,92,255,0.08)';
    if (n === selected) {
      ctx.shadowBlur = 28;
      ctx.shadowColor = 'rgba(124,92,255,0.42)';
    } else if (n === hover) {
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(124,92,255,0.22)';
    } else {
      ctx.shadowBlur = 0;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    let lineWidth = 1.2;
    let lineColor = 'rgba(255,255,255,0.18)';
    if (n === selected) {
      lineWidth = 3;
      lineColor = '#ffffff';
    } else if (selected && (parentsOf(selected).includes(n) || childrenOf(selected).includes(n) || partnersOf(selected).includes(n) || sharedParents(selected, n).length)) {
      lineWidth = 2.2;
      lineColor = '#ffffff';
    } else if (hover === n) {
      lineWidth = 2.0;
      lineColor = 'rgba(255,255,255,0.6)';
    }
    ctx.lineWidth = lineWidth;
    ctx.strokeStyle = lineColor;
    ctx.stroke();
    ctx.fillStyle = '#0c1020';
    ctx.font = '700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(initials(n.name), n.x, n.y);
    ctx.fillStyle = '#edf2ff';
    ctx.font = '12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText(n.name, n.x, n.y + n.r + 6);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// Animation loop.
function loop() {
  if (!physicsFrozen) tickPhysics();
  tickView();
  draw();
  requestAnimationFrame(loop);
}

// Convert pointer coordinate to world coordinate.
function toWorld(x, y, useTarget = false) {
  const v = useTarget ? targetView : view;
  return { x: (x - v.x) / v.k, y: (y - v.y) / v.k };
}

// Pick node under pointer (world coords).
function pick(x, y) {
  const w = toWorld(x, y);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = w.x - n.x;
    const dy = w.y - n.y;
    if (dx * dx + dy * dy <= n.r * n.r) return n;
  }
  return null;
}

// Escape HTML for safe insertion.
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Show details in panel and sheet. Also update trail.
function selectNode(n) {
  selected = n;
  updatePanel();
  updateSheet();
  if (n) {
    if (selectionTrail.length === 0 || selectionTrail[selectionTrail.length - 1].id !== n.id) {
      selectionTrail.push(n);
      if (selectionTrail.length > 5) selectionTrail.shift();
    }
    flyToNode(n, clamp(view.k * 1.05, 0.8, 1.4));
  } else {
    selectionTrail.length = 0;
  }
}

// Update desktop side panel content.
function updatePanel() {
  if (window.matchMedia('(max-width: 980px)').matches) return;
  if (!selected) {
    panel.innerHTML = '<div class="eyebrow">Mythic demo data</div><p class="empty">Tap a star to explore its connections.</p>';
    return;
  }
  const rels = getRelations(selected);
  const relHtml = rels.length ? rels.map((rel) => {
    const color = relationColor(rel.type);
    return `<div class="rel" data-id="${escapeHtml(rel.other.id)}"><span class="dot" style="background:${color}"></span><span>${escapeHtml(rel.other.name)}</span><small>${escapeHtml(REL_LABEL[rel.type] || rel.type)}</small></div>`;
  }).join('') : '<div class="empty">No recorded connections.</div>';
  panel.innerHTML = `
    <div class="eyebrow">Mythic demo data</div>
    <h2 class="person-name">${escapeHtml(selected.name)}</h2>
    <div class="person-meta">generation ${escapeHtml(selected.gen)} · ${escapeHtml(selected.role)}</div>
    <div class="field"><b>Note</b>${escapeHtml(selected.note)}</div>
    <div class="field"><b>Connections</b><div class="rels">${relHtml}</div></div>
    <div class="legend">
      <h3>Relationship lines</h3>
      <div class="leg-row"><span class="dot" style="background:${relationColor('parent')}"></span>parent / child</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor('partner')}"></span>partner</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor('sibling')}"></span>sibling</div>
      <div class="leg-row"><span class="dot" style="background:${relationColor('half')}"></span>partial sibling line</div>
    </div>`;
  panel.querySelectorAll('.rel').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.getAttribute('data-id');
      const t = byId[id];
      if (t) {
        selectNode(t);
      }
    });
  });
}

// Build list of relations for a node including child/parent/partner/sibling/half.
function getRelations(n) {
  const out = [];
  for (const p of parentsOf(n)) out.push({ other: p, type: 'parent' });
  for (const c of childrenOf(n)) out.push({ other: c, type: 'child' });
  for (const p of partnersOf(n)) out.push({ other: p, type: 'partner' });
  for (const link of siblingLinks) {
    if (link.source === n) out.push({ other: link.target, type: link.type });
    if (link.target === n) out.push({ other: link.source, type: link.type });
  }
  return out;
}

// Update bottom sheet for mobile. Show/hide accordingly.
function updateSheet() {
  if (!window.matchMedia('(max-width: 980px)').matches) {
    sheet.classList.remove('show');
    sheet.innerHTML = '';
    return;
  }
  if (!selected) {
    sheet.classList.remove('show');
    sheet.innerHTML = '';
    return;
  }
  const rels = getRelations(selected);
  const chips = rels.map(rel => {
    const color = relationColor(rel.type);
    const label = REL_LABEL[rel.type] || rel.type;
    return `<div class="chip" data-id="${escapeHtml(rel.other.id)}"><span style="background:${color}" class="dot"></span>${escapeHtml(label)} · ${escapeHtml(rel.other.name)}</div>`;
  }).join('');
  let trailStr = '';
  if (selectionTrail.length > 1) {
    trailStr = selectionTrail.map(n => escapeHtml(n.name)).join(' → ');
    trailStr = `<div class="trail"><span>${trailStr}</span></div>`;
  }
  sheet.innerHTML = `
    <div class="eyebrow">Mythic demo data</div>
    <h2 class="person-name">${escapeHtml(selected.name)}</h2>
    <div class="person-meta">generation ${escapeHtml(selected.gen)} · ${escapeHtml(selected.role)}</div>
    <div class="field"><b>Note</b>${escapeHtml(selected.note)}</div>
    <div class="field"><b>Connections</b><div class="chips">${chips || '<div class="empty">No recorded connections.</div>'}</div></div>
    ${trailStr}
  `;
  sheet.classList.add('show');
  sheet.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.getAttribute('data-id');
      const t = byId[id];
      if (t) {
        selectNode(t);
      }
    });
  });
}

// Move camera to a node smoothly.
function flyToNode(n, preferredZoom) {
  const k = preferredZoom || clamp(Math.max(view.k, 0.9), 0.72, 1.35);
  targetView = { x: W / 2 - n.x * k, y: H / 2 - n.y * k, k };
}

// Event listeners for canvas interactions.
cv.addEventListener('pointerdown', (e) => {
  const rect = cv.getBoundingClientRect();
  const p = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  const n = pick(p.x, p.y);
  moved = false;
  cv.setPointerCapture(e.pointerId);
  if (n) {
    dragNode = n;
    cv.classList.add('dragging');
  } else {
    panning = true;
    last = p;
    cv.classList.add('dragging');
  }
});

cv.addEventListener('pointermove', (e) => {
  const rect = cv.getBoundingClientRect();
  const p = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  if (dragNode) {
    const w = toWorld(p.x, p.y);
    dragNode.x = w.x;
    dragNode.y = w.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
    moved = true;
    return;
  }
  if (panning) {
    const dx = p.x - last.x;
    const dy = p.y - last.y;
    view.x += dx;
    view.y += dy;
    targetView.x += dx;
    targetView.y += dy;
    last = p;
    moved = true;
    return;
  }
  hover = pick(p.x, p.y);
  cv.style.cursor = hover ? 'pointer' : 'grab';
});

cv.addEventListener('pointerup', (e) => {
  const rect = cv.getBoundingClientRect();
  const p = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  if (dragNode && !moved) {
    selectNode(dragNode);
  } else if (!dragNode && !panning && !moved) {
    selectNode(pick(p.x, p.y));
  }
  dragNode = null;
  panning = false;
  cv.classList.remove('dragging');
});

cv.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = Math.exp(-e.deltaY * 0.0012);
  let nextK = clamp(targetView.k * zoomFactor, 0.32, 2.2);
  const rect = cv.getBoundingClientRect();
  const world = toWorld(e.clientX - rect.left, e.clientY - rect.top, true);
  targetView.k = nextK;
  targetView.x = (e.clientX - rect.left) - world.x * targetView.k;
  targetView.y = (e.clientY - rect.top) - world.y * targetView.k;
}, { passive: false });

// Search functionality.
let query = '';
document.getElementById('search').addEventListener('input', (e) => {
  query = e.target.value.trim().toLowerCase();
});

// Button actions.
document.getElementById('fit').addEventListener('click', () => {
  fitToGraph(false);
});
document.getElementById('freeze').addEventListener('click', (e) => {
  physicsFrozen = !physicsFrozen;
  e.currentTarget.classList.toggle('active', physicsFrozen);
  e.currentTarget.textContent = physicsFrozen ? 'Unfreeze' : 'Freeze';
});
document.getElementById('zoomOut').addEventListener('click', () => {
  const factor = 0.88;
  let nextK = clamp(targetView.k * factor, 0.32, 2.2);
  const center = { x: W / 2, y: H / 2 };
  const w = toWorld(center.x, center.y, true);
  targetView.k = nextK;
  targetView.x = center.x - w.x * nextK;
  targetView.y = center.y - w.y * nextK;
});
document.getElementById('zoomIn').addEventListener('click', () => {
  const factor = 1.18;
  let nextK = clamp(targetView.k * factor, 0.32, 2.2);
  const center = { x: W / 2, y: H / 2 };
  const w = toWorld(center.x, center.y, true);
  targetView.k = nextK;
  targetView.x = center.x - w.x * nextK;
  targetView.y = center.y - w.y * nextK;
});

// Window resize handler.
window.addEventListener('resize', resize);

// Initial setup.
positionNodesByGeneration();
resize();
updatePanel();
updateSheet();
requestAnimationFrame(loop);
</script>
</body>
</html>
