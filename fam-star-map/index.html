<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fam Star Map — House of Atreus</title>
<style>
  :root {
    --bg: #080a10;
    --bg-2: #0d0f18;
    --panel: #141925;
    --panel-2: #0c1019;
    --line: #243044;
    --ink: #edf3ff;
    --muted: #8f9cb4;
    --soft: #bdc8dc;
    --accent: #8bb8ff;
    --accent-2: #ffd479;
    --danger: #ff8a9a;

    --g0: #8bb8ff;
    --g1: #7ee0c9;
    --g2: #ffd479;
    --g3: #ff9aa2;
    --g4: #c8a8ff;

    --rel-parent: #4f75b4;
    --rel-partner: #c89446;
    --rel-sibling: #6f819b;
    --rel-half: #9b70de;
    --rel-curse: #ff708d;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    height: 100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(91, 128, 202, 0.22), transparent 32rem),
      radial-gradient(circle at 78% 18%, rgba(255, 212, 121, 0.10), transparent 28rem),
      linear-gradient(180deg, var(--bg-2), var(--bg));
    color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 1fr 330px;
    grid-template-rows: 58px 1fr;
    height: 100%;
  }

  header {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(20, 25, 37, 0.92);
    backdrop-filter: blur(12px);
  }

  header h1 {
    font-size: 15px;
    margin: 0;
    letter-spacing: 0.3px;
    font-weight: 700;
    white-space: nowrap;
  }

  header h1 span { color: var(--accent-2); }

  .tag {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  #search {
    margin-left: auto;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 12px;
    border-radius: 8px;
    width: 220px;
    outline: none;
  }

  #search:focus { border-color: var(--accent); }

  .btn {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }

  .btn:hover,
  .btn.active {
    color: var(--ink);
    border-color: var(--accent);
  }

  #stage {
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }

  canvas.dragging { cursor: grabbing; }

  aside {
    background: rgba(20, 25, 37, 0.94);
    border-left: 1px solid var(--line);
    padding: 18px;
    overflow: auto;
    backdrop-filter: blur(12px);
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
  }

  .panel-kicker {
    color: var(--accent-2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .person-name {
    font-size: 21px;
    font-weight: 700;
    margin: 0 0 3px;
    letter-spacing: -0.03em;
  }

  .person-meta {
    color: var(--muted);
    font-size: 12.5px;
    margin-bottom: 14px;
  }

  .field { margin-bottom: 12px; }

  .field b {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .field span,
  .field p {
    margin: 0;
    color: var(--soft);
  }

  .rels { margin-top: 6px; }

  .rel {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 3px;
  }

  .rel:hover { background: var(--panel-2); }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 auto;
    box-shadow: 0 0 12px currentColor;
  }

  .rel small {
    color: var(--muted);
    margin-left: auto;
    text-align: right;
    font-size: 11px;
  }

  .legend {
    margin-top: 22px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }

  .legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin: 0 0 8px;
  }

  .leg-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .hint {
    position: absolute;
    bottom: 12px;
    left: 14px;
    color: var(--muted);
    font-size: 11px;
    background: rgba(8, 10, 16, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 7px 10px;
    border-radius: 8px;
    pointer-events: none;
  }

  @media (max-width: 800px) {
    body { overflow: auto; }

    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto minmax(460px, 1fr) 300px;
      min-height: 100%;
    }

    header {
      grid-column: 1;
      flex-wrap: wrap;
      height: auto;
      padding: 12px;
    }

    #search {
      width: 100%;
      margin-left: 0;
    }

    aside {
      border-left: 0;
      border-top: 1px solid var(--line);
    }
  }
</style>
</head>

<body>
<div id="app">
  <header>
    <h1><span>✦</span> Fam Star Map</h1>
    <span class="tag">House of Atreus · public-domain myth demo</span>
    <input id="search" placeholder="Search the constellation…" autocomplete="off" />
    <button class="btn" id="freeze">Freeze</button>
    <button class="btn" id="reset">Re-center</button>
  </header>

  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">drag stars · scroll to zoom · click to inspect · freeze to hold the sky still</div>
  </div>

  <aside id="panel">
    <div class="panel-kicker">mythic demo data</div>
    <p class="empty">Click any star in the map to inspect its role, notes, and visible connections.</p>
  </aside>
</div>

<script>
const DATA = {

    },
    {
      id: "dione",

      role: "origin star",

      note: "A simplified partner node used to stabilize the mythic first generation."
    },
    {

      name: "Pelops",
      gen: 1,

      motif: "returned heir",
      note: "The branch through which the visible House of Atreus constellation forms."
    },
    {

      motif: "contested union",
      note: "Partner node for Pelops. A stable-looking connection with a very unstable inheritance."
    },
    {
      id: "atreus",
      name: "Atreus",
      gen: 2,
      role: "primary branch",

    },
    {
      id: "thyestes",

      motif: "rival branch",
      note: "Sibling and rival branch. Useful for showing how family maps become conflict maps."
    },
    {
      id: "aerope",
      name: "Aerope",
      gen: 2,
      role: "partner node",
      motif: "breach point",
      note: "Partner connection around which several versions of the myth turn unstable."
    },
    {
      id: "pelopia",
      name: "Pelopia",
      gen: 3,
      role: "partial record",
      motif: "hidden branch",
      note: "Simplified here as a partial record to keep the public demo readable."
    },
    {
      id: "agamemnon",
      name: "Agamemnon",
      gen: 3,
      role: "war branch",
      motif: "returning king",
      note: "A major visible node: power, return, sacrifice, and collapse all run through this star."
    },
    {
      id: "menelaus",
      name: "Menelaus",
      gen: 3,
      role: "war branch",
      motif: "lost / restored union",
      note: "Sibling branch tied to Helen, Sparta, and the wider Trojan constellation."
    },
    {
      id: "clytemnestra",
      name: "Clytemnestra",
      gen: 3,
      role: "partner star",
      motif: "counter-force",
      note: "Partner to Agamemnon. Not a side note: one of the strongest gravity fields in the map."
    },
    {
      id: "helen",
      name: "Helen",
      gen: 3,
      role: "partner star",
      motif: "bright signal",
      note: "A famous neighboring star. The family map starts behaving like a war map around her."
    },
    {
      id: "aegisthus",
      name: "Aegisthus",
      gen: 4,
      role: "late signal",
      motif: "revenge branch",
      note: "A late-returning branch. In the demo, he shows how a partial record can re-enter the main field."
    },
    {
      id: "iphigenia",
      name: "Iphigenia",
      gen: 4,
      role: "sacrifice star",
      motif: "vanishing point",
      note: "A node that demonstrates how one person can bend the emotional geometry of an entire archive."
    },
    {
      id: "electra",
      name: "Electra",
      gen: 4,
      role: "witness star",
      motif: "memory keeper",
      note: "A witness and continuity node. She carries the old story forward rather than closing it."
    },
    {
      id: "orestes",
      name: "Orestes",
      gen: 4,
      role: "returning signal",
      motif: "recursive justice",
      note: "The returning child branch. The constellation loops back through him."
    },
    {
      id: "chrysothemis",
      name: "Chrysothemis",
      gen: 4,
      role: "quiet branch",
      motif: "low-signal record",
      note: "A quieter branch included to keep the map from only showing the loudest mythic nodes."
    },
    {
      id: "hermione",
      name: "Hermione",
      gen: 4,
      role: "next branch",
      motif: "afterimage",
      note: "Child node of Helen and Menelaus. A continuation point after the central war story."
    }
  ],

  links: [
    { source: "tantalus", target: "dione", type: "partner" },
    { source: "tantalus", target: "pelops", type: "parent" },
    { source: "dione", target: "pelops", type: "parent" },

    { source: "pelops", target: "hippodamia", type: "partner" },
    { source: "pelops", target: "atreus", type: "parent" },
    { source: "hippodamia", target: "atreus", type: "parent" },
    { source: "pelops", target: "thyestes", type: "parent" },
    { source: "hippodamia", target: "thyestes", type: "parent" },

    { source: "atreus", target: "aerope", type: "partner" },
    { source: "atreus", target: "agamemnon", type: "parent" },
    { source: "aerope", target: "agamemnon", type: "parent" },
    { source: "atreus", target: "menelaus", type: "parent" },
    { source: "aerope", target: "menelaus", type: "parent" },

    { source: "thyestes", target: "pelopia", type: "parent" },
    { source: "thyestes", target: "aegisthus", type: "parent" },
    { source: "pelopia", target: "aegisthus", type: "parent" },

    { source: "agamemnon", target: "clytemnestra", type: "partner" },
    { source: "menelaus", target: "helen", type: "partner" },

    { source: "agamemnon", target: "iphigenia", type: "parent" },
    { source: "clytemnestra", target: "iphigenia", type: "parent" },
    { source: "agamemnon", target: "electra", type: "parent" },
    { source: "clytemnestra", target: "electra", type: "parent" },
    { source: "agamemnon", target: "orestes", type: "parent" },
    { source: "clytemnestra", target: "orestes", type: "parent" },
    { source: "agamemnon", target: "chrysothemis", type: "parent" },
    { source: "clytemnestra", target: "chrysothemis", type: "parent" },

    { source: "menelaus", target: "hermione", type: "parent" },
    { source: "helen", target: "hermione", type: "parent" },

    { source: "tantalus", target: "atreus", type: "curse" },
    { source: "tantalus", target: "thyestes", type: "curse" },
    { source: "thyestes", target: "agamemnon", type: "curse" },
    { source: "aegisthus", target: "orestes", type: "curse" }
  ]
};

const root = document.documentElement;
const css = getComputedStyle(root);

const GEN_COLORS = ["--g0", "--g1", "--g2", "--g3", "--g4"]
  .map(name => css.getPropertyValue(name).trim());

const REL_COLORS = {
  parent: css.getPropertyValue("--rel-parent").trim(),
  partner: css.getPropertyValue("--rel-partner").trim(),
  sibling: css.getPropertyValue("--rel-sibling").trim(),
  half: css.getPropertyValue("--rel-half").trim(),
  curse: css.getPropertyValue("--rel-curse").trim()
};

const REL_LABEL = {
  parent: "parent / child",
  child: "child / parent",
  partner: "partner",
  sibling: "sibling",
  half: "partial sibling line",
  curse: "mythic pressure line"
};

const byId = {};
const nodes = DATA.people.map(person => {
  const node = { ...person, x: 0, y: 0, vx: 0, vy: 0, r: 22 };
  byId[node.id] = node;
  return node;
});

const directLinks = DATA.links
  .filter(link => byId[link.source] && byId[link.target])
  .map(link => ({
    source: byId[link.source],
    target: byId[link.target],
    type: link.type
  }));

positionNodesByGeneration();

const siblingLinks = deriveSiblingLinks();
const visualLinks = [...directLinks, ...siblingLinks];

const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const panel = document.getElementById("panel");
const freezeButton = document.getElementById("freeze");

let W = 0;
let H = 0;
let DPR = Math.max(1, window.devicePixelRatio || 1);
let view = { x: 0, y: 0, k: 1 };
let cameraTarget = null;
let selected = null;
let hover = null;
let query = "";
let dragNode = null;
let panning = false;
let last = { x: 0, y: 0 };
let moved = false;
let frozen = false;
let stars = [];

function positionNodesByGeneration() {
  const groups = new Map();

  for (const node of nodes) {
    if (!groups.has(node.gen)) groups.set(node.gen, []);
    groups.get(node.gen).push(node);
  }

  for (const [gen, group] of groups.entries()) {
    group.forEach((node, index) => {
      node.x = (index - (group.length - 1) / 2) * 142;
      node.y = (gen - 2.05) * 128;
    });
  }
}

function buildStars() {
  const count = Math.max(90, Math.floor((W * H) / 8200));
  stars = Array.from({ length: count }, (_, i) => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() < 0.08 ? 1.6 : 0.6 + Math.random() * 0.9,
    a: 0.18 + Math.random() * 0.62,
    tw: Math.random() * Math.PI * 2,
    speed: 0.002 + Math.random() * 0.006,
    drift: i % 3 === 0 ? 0.18 + Math.random() * 0.28 : 0
  }));
}

function parentsOf(node) {
  return directLinks
    .filter(link => link.type === "parent" && link.target === node)
    .map(link => link.source);
}

function childrenOf(node) {
  return directLinks
    .filter(link => link.type === "parent" && link.source === node)
    .map(link => link.target);
}

function partnersOf(node) {
  return directLinks
    .filter(link => link.type === "partner" && (link.source === node || link.target === node))
    .map(link => link.source === node ? link.target : link.source);
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const ids = new Set(a.map(node => node.id));
  return b.every(node => ids.has(node.id));
}

function sharedParents(a, b) {
  const aParents = parentsOf(a);
  const bParents = parentsOf(b);
  const bIds = new Set(bParents.map(node => node.id));
  return aParents.filter(parent => bIds.has(parent.id));
}

function deriveSiblingLinks() {
  const links = [];

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      const shared = sharedParents(a, b);

      if (!shared.length) continue;

      const aParents = parentsOf(a);
      const bParents = parentsOf(b);
      const type = sameSet(aParents, bParents) ? "sibling" : "half";

      links.push({ source: a, target: b, type });
    }
  }

  return links;
}

function relationsOf(node) {
  const out = [];

  for (const parent of parentsOf(node)) out.push({ other: parent, type: "parent" });
  for (const child of childrenOf(node)) out.push({ other: child, type: "child" });
  for (const partner of partnersOf(node)) out.push({ other: partner, type: "partner" });

  for (const link of siblingLinks) {
    if (link.source === node) out.push({ other: link.target, type: link.type });
    if (link.target === node) out.push({ other: link.source, type: link.type });
  }

  for (const link of directLinks.filter(link => link.type === "curse")) {
    if (link.source === node) out.push({ other: link.target, type: "curse" });
    if (link.target === node) out.push({ other: link.source, type: "curse" });
  }

  return out;
}

function resize() {
  const rect = cv.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  DPR = Math.max(1, window.devicePixelRatio || 1);
  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  view.x = W / 2;
  view.y = H / 2;
  buildStars();
}

window.addEventListener("resize", resize);

function tick() {
  easeCamera();

  if (frozen && !dragNode) return;

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i];
      const b = nodes[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d2 = dx * dx + dy * dy || 0.01;
      let d = Math.sqrt(d2);
      let force = 2850 / d2;
      let ux = dx / d;
      let uy = dy / d;

      a.vx -= ux * force;
      a.vy -= uy * force;
      b.vx += ux * force;
      b.vy += uy * force;
    }
  }

  for (const link of visualLinks) {
    const a = link.source;
    const b = link.target;
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    let rest = link.type === "partner" ? 78 : link.type === "curse" ? 210 : link.type === "half" ? 148 : link.type === "sibling" ? 125 : 118;
    let stiffness = link.type === "curse" ? 0.003 : link.type === "sibling" ? 0.006 : link.type === "half" ? 0.008 : 0.022;
    let force = (d - rest) * stiffness;
    let ux = dx / d;
    let uy = dy / d;

    a.vx += ux * force;
    a.vy += uy * force;
    b.vx -= ux * force;
    b.vy -= uy * force;
  }

  for (const node of nodes) {
    const targetY = (node.gen - 2.05) * 128;
    node.vy += (targetY - node.y) * 0.004;
    node.vx += (0 - node.x) * 0.002;

    if (node !== dragNode) {
      node.vx *= 0.86;
      node.vy *= 0.86;
      node.x += node.vx;
      node.y += node.vy;
    }
  }
}

function easeCamera() {
  if (!cameraTarget) return;

  view.x += (cameraTarget.x - view.x) * 0.12;
  view.y += (cameraTarget.y - view.y) * 0.12;
  view.k += (cameraTarget.k - view.k) * 0.10;

  const done = Math.abs(view.x - cameraTarget.x) < 0.4 &&
    Math.abs(view.y - cameraTarget.y) < 0.4 &&
    Math.abs(view.k - cameraTarget.k) < 0.004;

  if (done) cameraTarget = null;
}

function drawStars() {
  const now = performance.now();

  ctx.save();
  ctx.clearRect(0, 0, W, H);

  for (const star of stars) {
    const twinkle = Math.sin(now * star.speed + star.tw) * 0.22;
    const alpha = Math.max(0.08, star.a + twinkle);
    const x = star.x + Math.sin(now * 0.00008 + star.tw) * star.drift;
    const y = star.y + Math.cos(now * 0.00007 + star.tw) * star.drift;

    ctx.beginPath();
    ctx.arc(x, y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(237, 243, 255, ${alpha})`;
    ctx.fill();
  }

  const gradient = ctx.createRadialGradient(W * 0.52, H * 0.48, 40, W * 0.52, H * 0.48, Math.max(W, H) * 0.75);
  gradient.addColorStop(0, "rgba(139, 184, 255, 0.06)");
  gradient.addColorStop(1, "rgba(8, 10, 16, 0.35)");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function draw() {
  drawStars();
  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.k, view.k);

  for (const link of visualLinks) {
    const dim = query && !matches(link.source) && !matches(link.target);
    const alpha = dim ? 0.08 : link.type === "curse" ? 0.36 : link.type === "sibling" ? 0.30 : 0.68;
    const color = REL_COLORS[link.type] || "#3a4557";

    ctx.beginPath();
    ctx.moveTo(link.source.x, link.source.y);
    ctx.lineTo(link.target.x, link.target.y);

    ctx.strokeStyle = color;
    ctx.lineWidth = link.type === "curse" ? 1.2 : link.type === "half" ? 2.1 : 1.55;
    ctx.globalAlpha = alpha;

    if (link.type === "half") ctx.setLineDash([5, 5]);
    else if (link.type === "curse") ctx.setLineDash([2, 10]);
    else ctx.setLineDash([]);

    ctx.shadowBlur = link.type === "curse" ? 14 : 6;
    ctx.shadowColor = color;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  for (const node of nodes) {
    const dim = query && !matches(node);
    const color = GEN_COLORS[node.gen % GEN_COLORS.length];
    const isActive = node === selected || node === hover;

    ctx.globalAlpha = dim ? 0.16 : 1;

    if (isActive || node.id === "tantalus") {
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r + (isActive ? 12 : 7), 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = dim ? 0.05 : isActive ? 0.17 : 0.09;
      ctx.fill();
      ctx.globalAlpha = dim ? 0.16 : 1;
    }

    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.shadowBlur = isActive ? 26 : 12;
    ctx.shadowColor = color;
    ctx.fill();
    ctx.shadowBlur = 0;

    if (isActive) {
      ctx.lineWidth = 2.8;
      ctx.strokeStyle = "#ffffff";
      ctx.stroke();
    }

    ctx.fillStyle = "#080a10";
    ctx.font = "700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(initials(node.name), node.x, node.y);

    ctx.fillStyle = css.getPropertyValue("--ink").trim();
    ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.textBaseline = "top";
    ctx.fillText(node.name, node.x, node.y + node.r + 5);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function initials(name) {
  return name
    .split(/\s+/)
    .map(word => word[0])
    .join("")
    .slice(0, 2)
    .toUpperCase();
}

function matches(node) {
  return query && (
    node.name.toLowerCase().includes(query) ||
    node.role.toLowerCase().includes(query) ||
    node.motif.toLowerCase().includes(query) ||
    node.note.toLowerCase().includes(query)
  );
}

function loop() {
  tick();
  draw();
  requestAnimationFrame(loop);
}

function pointFromEvent(event) {
  const rect = cv.getBoundingClientRect();
  return {
    x: event.clientX - rect.left,
    y: event.clientY - rect.top
  };
}

function toWorld(x, y) {
  return {
    x: (x - view.x) / view.k,
    y: (y - view.y) / view.k
  };
}

function pick(x, y) {
  const world = toWorld(x, y);

  for (let i = nodes.length - 1; i >= 0; i--) {
    const node = nodes[i];
    const dx = world.x - node.x;
    const dy = world.y - node.y;

    if (dx * dx + dy * dy <= node.r * node.r) return node;
  }

  return null;
}

cv.addEventListener("pointerdown", event => {
  const p = pointFromEvent(event);
  const node = pick(p.x, p.y);

  moved = false;
  cameraTarget = null;
  cv.setPointerCapture(event.pointerId);

  if (node) {
    dragNode = node;
    cv.classList.add("dragging");
  } else {
    panning = true;
    last = p;
    cv.classList.add("dragging");
  }
});

cv.addEventListener("pointermove", event => {
  const p = pointFromEvent(event);

  if (dragNode) {
    const world = toWorld(p.x, p.y);
    dragNode.x = world.x;
    dragNode.y = world.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
    moved = true;
    return;
  }

  if (panning) {
    view.x += p.x - last.x;
    view.y += p.y - last.y;
    last = p;
    moved = true;
    return;
  }

  hover = pick(p.x, p.y);
  cv.style.cursor = hover ? "pointer" : "grab";
});

cv.addEventListener("pointerup", event => {
  const p = pointFromEvent(event);

  if (dragNode && !moved) select(dragNode);
  else if (!dragNode && !panning && !moved) select(pick(p.x, p.y));

  dragNode = null;
  panning = false;
  cv.classList.remove("dragging");
});

cv.addEventListener("wheel", event => {
  event.preventDefault();
  cameraTarget = null;

  const zoom = event.deltaY < 0 ? 1.1 : 0.9;
  const wx = (event.offsetX - view.x) / view.k;
  const wy = (event.offsetY - view.y) / view.k;

  view.k = Math.min(3.2, Math.max(0.35, view.k * zoom));
  view.x = event.offsetX - wx * view.k;
  view.y = event.offsetY - wy * view.k;
}, { passive: false });

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function focusNode(node, zoom = Math.max(1.04, view.k)) {
  cameraTarget = {
    x: W / 2 - node.x * zoom,
    y: H / 2 - node.y * zoom,
    k: zoom
  };
}

function select(node) {
  selected = node;

  if (!node) {
    panel.innerHTML = `
      <div class="panel-kicker">mythic demo data</div>
      <p class="empty">Click any star in the map to inspect its role, notes, and visible connections.</p>
    `;
    return;
  }

  const relations = relationsOf(node);
  const relationHtml = relations.length
    ? relations.map(relation => {
        const color = REL_COLORS[relation.type] || REL_COLORS.parent;
        return `
          <div class="rel" data-id="${escapeHtml(relation.other.id)}">
            <span class="dot" style="background:${color}; color:${color}"></span>
            <span>${escapeHtml(relation.other.name)}</span>
            <small>${escapeHtml(REL_LABEL[relation.type] || relation.type)}</small>
          </div>
        `;
      }).join("")
    : '<div class="empty">No recorded connections.</div>';

  panel.innerHTML = `
    <div class="panel-kicker">${escapeHtml(node.motif)}</div>
    <h2 class="person-name">${escapeHtml(node.name)}</h2>
    <div class="person-meta">generation ${escapeHtml(node.gen)} · ${escapeHtml(node.role)}</div>

    <div class="field">
      <b>Note</b>
      <p>${escapeHtml(node.note)}</p>
    </div>

    <div class="field">
      <b>Connections</b>
      <div class="rels">${relationHtml}</div>
    </div>

    <div class="legend">
      <h3>Line types</h3>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.parent}; color:${REL_COLORS.parent}"></span>parent / child</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.partner}; color:${REL_COLORS.partner}"></span>partner</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.sibling}; color:${REL_COLORS.sibling}"></span>sibling</div>
      <div class="leg-row"><span class="dot" style="background:${REL_COLORS.curse}; color:${REL_COLORS.curse}"></span>mythic pressure line</div>
    </div>
  `;

  panel.querySelectorAll(".rel").forEach(element => {
    element.addEventListener("click", () => {
      const target = byId[element.dataset.id];
      if (!target) return;
      select(target);
      focusNode(target);
    });
  });
}

document.getElementById("search").addEventListener("input", event => {
  query = event.target.value.trim().toLowerCase();
});

document.getElementById("reset").addEventListener("click", () => {
  cameraTarget = { x: W / 2, y: H / 2, k: 1 };
});

freezeButton.addEventListener("click", () => {
  frozen = !frozen;
  freezeButton.textContent = frozen ? "Unfreeze" : "Freeze";
  freezeButton.classList.toggle("active", frozen);
});

resize();
loop();
</script>
</body>
</html>
