<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fungi Cell Map</title>
    <style>
        :root {
            --bg-deep: #090d18;
            --panel-bg: rgba(14, 25, 48, 0.85);
            --border-glow: rgba(124, 92, 255, 0.4);
            --ink: #e0e6ed;
            --muted: #8892b0;
            --teal: #7ee4d2;
            --gold: #f4c430;
            --flux-high: #7ee4d2;
            --flux-mid: #7c5cff;
            --flux-low: #4a5d8c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; background-color: var(--bg-deep);
            color: var(--ink); font-family: -apple-system, monospace;
            overflow: hidden; display: flex;
        }
        #canvas-wrapper { position: relative; flex: 1; height: 100%; }
        canvas { width: 100%; height: 100%; display: block; cursor: grab; }
        canvas.dragging { cursor: grabbing; }
        #inspector {
            width: 380px; height: 100%; background: var(--panel-bg);
            border-left: 1px solid var(--border-glow); backdrop-filter: blur(12px);
            padding: 24px; overflow-y: auto; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }
        .eyebrow {
            font-family: monospace; font-size: 11px; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px;
        }
        .compartment-name { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .compartment-status { font-family: monospace; font-size: 12px; color: var(--teal); margin-bottom: 24px; }
        .field { border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 12px 0; font-size: 13px; }
        .field b { display: block; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
        .hyphal-conns { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .hyphal-link {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 14px; border-radius: 6px; display: flex; align-items: center;
            gap: 12px; cursor: pointer; transition: all 0.2s ease;
        }
        .hyphal-link:hover { background: rgba(124, 92, 255, 0.15); border-color: var(--border-glow); }
        .hyphal-link .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
        .hyphal-link span { font-size: 13px; flex: 1; }
        .hyphal-link small { font-family: monospace; color: var(--muted); }
        .empty { font-size: 13px; color: var(--muted); font-style: italic; padding: 12px 0; }
    </style>
</head>
<body>
    <div id="canvas-wrapper"><canvas id="constellation"></canvas></div>
    <div id="inspector">
        <div id="inspector-content">
            <div class="eyebrow">System Live Runtime</div>
            <h2 class="compartment-name" style="color: var(--muted);">No Selection</h2>
            <div class="compartment-status">// Target a Coacervate node to open its structural profile.</div>
        </div>
    </div>
    <script>
        const compartments = [
            { id: 0, name: "Source-Compiler-Core", type: "Fluid-Dense", tokens: "42,500", volume: "0.425", valency: "7.842", entropy: "1.214", desc: "Houses core architecture scripts." },
            { id: 1, name: "Regulatory-Compliance-Tax", type: "Fluid-Isolated", tokens: "15,000", volume: "0.150", valency: "2.104", entropy: "4.812", desc: "Corporate auditing profiles." },
            { id: 2, name: "Mathematical-Proof-Lib", type: "Ostwald-Ripened", tokens: "6,700", volume: "0.067", valency: "6.118", entropy: "0.925", desc: "Fused semantic equations." },
            { id: 3, name: "Temporal-Context-Droplet", type: "Porous-Nucleating", tokens: "1,200", volume: "0.012", valency: "4.551", entropy: "2.314", desc: "Volatile conversational inputs." }
        ];

        const hyphalLinks = [
            { source: 0, target: 2, flux: "0.941", type: "high" },
            { source: 0, target: 3, flux: "0.684", type: "mid" },
            { source: 2, target: 3, flux: "0.412", type: "low" },
            { source: 1, target: 3, flux: "0.104", type: "low" }
        ];

        const canvas = document.getElementById("constellation");
        const ctx = canvas.getContext("2d");
        let width = canvas.width = canvas.parentElement.offsetWidth;
        let height = canvas.height = canvas.parentElement.offsetHeight;

        const nodes = compartments.map((c, i) => ({
            ...c, x: width/2 + (Math.cos(i*1.5)*120), y: height/2 + (Math.sin(i*1.5)*120),
            vx: 0, vy: 0, radius: parseFloat(c.volume)*40 + 20
        }));

        let selectedNodeId = null, dragNode = null, panX = 0, panY = 0, isPanning = false, startX, startY;

        window.addEventListener("resize", () => {
            width = canvas.width = canvas.parentElement.offsetWidth;
            height = canvas.height = canvas.parentElement.offsetHeight;
        });

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left - panX;
            const my = e.clientY - rect.top - panY;
            dragNode = nodes.find(n => Math.sqrt((n.x-mx)**2 + (n.y-my)**2) < n.radius);
            if(dragNode) { selectedNodeId = dragNode.id; updateInspector(dragNode.id); canvas.classList.add("dragging"); }
            else { isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY; }
        });

        canvas.addEventListener("mousemove", (e) => {
            if(dragNode) { const r = canvas.getBoundingClientRect(); dragNode.x = e.clientX - r.left - panX; dragNode.y = e.clientY - r.top - panY; }
            else if(isPanning) { panX = e.clientX - startX; panY = e.clientY - startY; }
        });

        canvas.addEventListener("mouseup", () => { dragNode = null; isPanning = false; canvas.classList.remove("dragging"); });

        window.navigateToNode = function(id) { selectedNodeId = id; updateInspector(id); };

        function updateInspector(id) {
            const node = nodes.find(n => n.id === id);
            const activeLinks = hyphalLinks.filter(l => l.source === id || l.target === id);
            let linksHTML = activeLinks.map(l => {
                const targetId = l.source === id ? l.target : l.source;
                const targetNode = nodes.find(n => n.id === targetId);
                let colorClass = `var(--flux-${l.type})`;
                return `<div class="hyphal-link" onclick="navigateToNode(${targetId})">
                        <div class="dot" style="background: ${colorClass}"></div>
                        <span>${targetNode.name}</span><small>Ψ: ${l.flux}</small></div>`;
            }).join("");
            
            document.getElementById("inspector-content").innerHTML = `
                <div class="eyebrow">Active Compartment Profile</div>
                <h2 class="compartment-name">${node.name}</h2>
                <div class="compartment-status">// Phase State: ${node.type}</div>
                <div class="field"><b>Token Volume (Φ)</b><span>${node.volume}</span></div>
                <div class="field"><b>Valency (V_p)</b><span>${node.valency}</span></div>
                <div class="field"><b>Entropy</b><span>${node.entropy}</span></div>
                <div class="field"><b>Substrate Profile</b><div style="font-size:12px; color:var(--muted); margin-top:4px;">${node.desc}</div></div>
                <div class="eyebrow" style="margin-top:20px;">Hyphal Links</div>
                <div class="hyphal-conns">${linksHTML || '<div class="empty">No active links.</div>'}</div>
            `;
        }

        function step() {
            ctx.clearRect(0, 0, width, height); ctx.save(); ctx.translate(panX, panY);
            
            // Physics
            hyphalLinks.forEach(l => {
                const s = nodes[l.source], t = nodes[l.target];
                const dx = t.x - s.x, dy = t.y - s.y, dist = Math.sqrt(dx*dx + dy*dy) || 1;
                const f = (dist - 180) * (0.015 * parseFloat(l.flux));
                if(s !== dragNode) { s.vx += (dx/dist)*f; s.vy += (dy/dist)*f; }
                if(t !== dragNode) { t.vx -= (dx/dist)*f; t.vy -= (dy/dist)*f; }
            });

            nodes.forEach(n => {
                if(n !== dragNode) { n.x += n.vx; n.y += n.vy; n.vx *= 0.85; n.vy *= 0.85; }
                
                // Draw Connections
                hyphalLinks.forEach(l => {
                   if(nodes[l.source] === n || nodes[l.target] === n) {
                       const t = nodes[l.source] === n ? nodes[l.target] : nodes[l.source];
                       ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(t.x, t.y);
                       ctx.strokeStyle = l.type === 'high' ? "rgba(126,228,210,0.4)" : "rgba(124,92,255,0.2)";
                       ctx.lineWidth = parseFloat(l.flux) * 3; ctx.stroke();
                   }
                });

                // Draw Nodes
                ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2);
                let g = ctx.createRadialGradient(n.x, n.y, 2, n.x, n.y, n.radius);
                g.addColorStop(0, 'rgba(14,25,48,0.95)'); g.addColorStop(1, 'rgba(9,13,24,0.9)');
                ctx.fillStyle = g; ctx.fill();
                ctx.strokeStyle = (n.id === selectedNodeId) ? "#7ee4d2" : "rgba(124,92,255,0.4)";
                ctx.lineWidth = 2; ctx.stroke();
                
                ctx.fillStyle = "#e0e6ed"; ctx.font = "11px monospace"; ctx.textAlign = "center";
                ctx.fillText(n.name, n.x, n.y - 2);
            });
            ctx.restore(); requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    </script>
</body>
</html>
