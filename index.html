<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GUVs</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070808;
      --panel: #101313;
      --line: #273030;
      --text: #e8eeee;
      --muted: #9aa7a7;
      --accent: #b7fff4;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      background: radial-gradient(circle at top left, #142020 0, var(--bg) 38rem);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.5;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: max(64px, env(safe-area-inset-top)) 0 max(64px, env(safe-area-inset-bottom));
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(44px, 8vw, 88px);
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    .dek {
      max-width: 760px;
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .collection-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 34px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .collection-meta span {
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(16, 19, 19, 0.72);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      min-width: 0;
    }

    .card {
      display: block;
      min-width: 0;
      min-height: 180px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 86%, transparent);
      color: inherit;
      text-decoration: none;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      background: #131a1a;
    }

    .card.featured {
      grid-column: span 2;
      min-height: 218px;
      background:
        radial-gradient(circle at 90% 10%, rgba(183, 255, 244, 0.13), transparent 20rem),
        linear-gradient(135deg, rgba(16, 19, 19, 0.96), rgba(18, 27, 27, 0.92));
      border-color: rgba(183, 255, 244, 0.3);
    }

    .open-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 18px;
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .open-label::after { content: "↗"; font-size: 14px; }

    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-color: var(--accent);
    }

    .card:active { transform: translateY(0); }

    .eyebrow {
      margin-bottom: 18px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .title {
      margin: 0 0 4px;
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .full-name {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .description {
      margin: 0;
      color: #c9d2d2;
      font-size: 13px;
    }

    .dek,
    .full-name,
    .description {
      overflow-wrap: anywhere;
    }

    .status {
      display: inline-block;
      margin-top: 18px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    footer {
      margin-top: 44px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 600px) {
      main {
        width: min(calc(100% - 24px), 920px);
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(32px, env(safe-area-inset-bottom));
      }

      h1 { margin-bottom: 8px; font-size: 52px; }
      .dek {
        margin-bottom: 12px;
        font-size: 13px;
        line-height: 1.4;
      }
      .collection-meta {
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }
      .collection-meta span { padding: 5px 8px; font-size: 9px; }
      .grid { grid-template-columns: 1fr; }
      .card, .card.featured {
        grid-column: auto;
        min-height: 0;
        padding: 15px 16px;
        border-radius: 16px;
      }
      .card.featured {
        padding: 18px;
        border-color: rgba(183, 255, 244, 0.45);
      }
      .eyebrow { margin-bottom: 10px; font-size: 9px; }
      .title { font-size: 20px; }
      .full-name { margin-bottom: 8px; font-size: 11px; }
      .description {
        display: -webkit-box;
        overflow: hidden;
        font-size: 11px;
        line-height: 1.45;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .status { display: none; }
      .open-label { margin-top: 10px; font-size: 9px; }
      footer { margin-top: 26px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1>GUVs</h1>
    <p class="dek">
      Giant Unilamellar Vesicles. Small membrane-bound browser tools for semantic testing,
      provenance, AI behavior, and post-slop workflows.
    </p>
    <div class="collection-meta" aria-label="Collection status">
      <span id="guvCount">Loading collection</span>
      <span>One membrane engine · multiple lenses</span>
      <span>Desktop + mobile</span>
    </div>

    <section id="guv-grid" class="grid" aria-label="GUV index"></section>

    <footer>
      Registry-driven index. Add or remove entries in <code>registry.json</code>.
    </footer>
  </main>

  <script>
    const grid = document.querySelector("#guv-grid");

    fetch("./registry.json")
      .then((response) => response.json())
      .then((guvs) => {
        grid.innerHTML = guvs.map((guv) => {
          const type = Array.isArray(guv.type) ? guv.type.join(" / ") : "GUV";
          const fullName = guv.fullName ? `<p class="full-name">${guv.fullName}</p>` : "";
          const status = guv.status ? `<span class="status">${guv.status}</span>` : "";

          return `
            <a class="card${guv.featured ? " featured" : ""}" href="${guv.path}">
              <div class="eyebrow">${type}</div>
              <h2 class="title">${guv.title}</h2>
              ${fullName}
              <p class="description">${guv.description || ""}</p>
              ${status}
              <span class="open-label">Open ${guv.featured ? "core interface" : "GUV"}</span>
            </a>
          `;
        }).join("");
        document.querySelector("#guvCount").textContent = `${guvs.length} working GUVs`;
      })
      .catch((error) => {
        grid.innerHTML = `<p class="description">Registry failed to load.</p>`;
        console.error(error);
      });
  </script>
</body>
</html>
