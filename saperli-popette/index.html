<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Saperli Popette</title>
<style>
:root{--bg:#0c0a09;--panel:#161311;--panel2:#1f1b18;--line:#2a2521;--text:#f3ede4;--muted:#9a9088;--amber:#f0a35e;--you:#2b2017;--danger:#ff8b8b}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(12,10,9,.72);backdrop-filter:blur(8px)}.logo{width:34px;height:34px;border-radius:10px;flex:none;background:linear-gradient(135deg,var(--amber),#c97a3a);display:flex;align-items:center;justify-content:center}.title{font-size:15px;font-weight:700}.sub{font-size:12px;color:var(--muted);margin-top:1px}.spacer{flex:1}.iconbtn,.mic{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:12px;cursor:pointer}.iconbtn{width:34px;height:34px;font-size:15px}.mic{width:48px;height:48px;font-size:18px}.mic.active{border-color:var(--amber);color:var(--amber)}
#chat{flex:1;overflow-y:auto;padding:24px 0 12px}.wrap{max-width:760px;margin:0 auto;width:100%;padding:0 20px}.row{display:flex;width:100%;margin-bottom:14px}.row.them{justify-content:flex-start}.row.you{justify-content:flex-end}.bubble{max-width:74%;padding:12px 15px;border-radius:16px;line-height:1.5;font-size:17px;white-space:pre-wrap;overflow-wrap:anywhere;display:flex;gap:10px;align-items:center}.them .bubble{background:#181614;border:1px solid var(--line);border-bottom-left-radius:5px}.you .bubble{background:var(--you);border:1px solid #4a3621;border-bottom-right-radius:5px}.bubble span{min-width:0}.actions{display:flex;gap:6px;flex:none;align-self:flex-start}.action-btn{background:none;border:none;cursor:pointer;font-size:16px;opacity:.7;padding:2px}
footer{border-top:1px solid var(--line);background:var(--panel);padding:12px 0 16px}.composer{max-width:760px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:8px}.inputrow{display:flex;gap:10px;align-items:flex-end}textarea{flex:1;resize:none;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px 14px;font-size:16px;font-family:inherit;line-height:1.4;max-height:120px;min-height:48px;overflow-y:auto}textarea:focus{outline:none;border-color:#6b635c}.send{background:var(--amber);border:none;color:#1a120a;font-weight:700;border-radius:12px;padding:0 18px;height:48px;cursor:pointer;font-size:15px;flex:none}.send:disabled{opacity:.6}.status{font-size:12px;color:var(--muted);min-height:16px;padding-left:2px}.status.error{color:var(--danger)}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);max-width:min(640px,calc(100vw - 32px));max-height:min(60vh,520px);overflow:auto;background:var(--panel);border:1px solid var(--line);box-shadow:0 10px 35px rgba(0,0,0,.35);border-radius:14px;padding:14px 16px;z-index:70;display:none;line-height:1.45;font-size:15px;white-space:pre-wrap}.toast.show{display:block}.toast strong{color:var(--amber)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.overlay.show{display:flex}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;max-width:440px;width:100%}.card h2{margin:0 0 6px;font-size:18px}.card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}.card a{color:#8b5cf6}.card input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:14px;font-family:ui-monospace,monospace}.cardhead{display:flex;align-items:center;gap:12px;margin-bottom:6px}.cardhead h2{margin:0;flex:1}.cardhead .close-settings{width:44px;height:44px;min-width:44px;font-size:22px}.cardbtns{display:flex;gap:10px;margin-top:20px}.cardbtns button{flex:1;border-radius:11px;padding:11px;cursor:pointer;font-weight:600;border:1px solid var(--line)}.primary{background:var(--amber);color:#1a120a;border:none!important}.secondary{background:var(--panel2);color:var(--text)}
@media(max-width:640px){.bubble{max-width:88%;font-size:16px}header{padding:12px 14px}.wrap,.composer{padding:0 14px}.send{padding:0 14px}}

/* 2026 mobile-first product pass */
body{height:100dvh;min-height:100svh}header{flex:none;padding-top:max(12px,env(safe-area-inset-top));padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}#chat{min-height:0;overscroll-behavior:contain;scroll-padding-bottom:16px}.bubble{display:block}.actions{margin-top:8px;justify-content:flex-end}.action-btn{min-width:40px;min-height:40px;border-radius:10px;background:rgba(255,255,255,.03)}footer{flex:none;padding-bottom:max(12px,env(safe-area-inset-bottom))}.toast{bottom:calc(96px + env(safe-area-inset-bottom))}.iconbtn,.mic,.send{min-width:44px;min-height:44px}.iconbtn:focus-visible,.mic:focus-visible,.send:focus-visible,.action-btn:focus-visible,textarea:focus-visible,.card button:focus-visible,.card input:focus-visible{outline:3px solid rgba(240,163,94,.5);outline-offset:2px}
@media(max-width:640px){#chat{padding:16px 0 10px}.bubble{max-width:92%;font-size:16px;padding:12px 14px}.wrap,.composer{padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right))}.inputrow{display:grid;grid-template-columns:44px minmax(0,1fr) 64px;gap:8px}.mic{width:44px;height:48px}.send{width:64px;padding:0 10px}.overlay{align-items:flex-end;padding:12px}.card{max-height:min(82dvh,620px);overflow:auto;padding:20px;border-radius:18px}.toast{max-width:calc(100vw - 24px)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<header><div class="logo" aria-hidden="true">🍄</div><div><div class="title">Saperli Popette</div><div class="sub">Mycelian French conversation</div></div><div class="spacer"></div><button class="iconbtn" id="settingsBtn" type="button" aria-label="Open settings" title="Settings">⚙️</button></header>
<main id="chat"><div class="wrap" id="thread" role="log" aria-live="polite" aria-relevant="additions"></div></main>
<footer><div class="composer"><div class="inputrow"><button class="mic" id="micBtn" type="button" aria-label="Start French dictation" title="Dictate in French">🎙️</button><textarea id="input" rows="1" aria-label="Message Saperli" placeholder="Speak, edit, then send..."></textarea><button class="send" id="sendBtn" type="button">Send</button></div><div class="status" id="status" role="status" aria-live="polite"></div></div></footer>
<div class="toast" id="hintToast" role="status" aria-live="polite"></div>
<div class="overlay" id="overlay" aria-hidden="true"><div class="card" role="dialog" aria-modal="true" aria-labelledby="keyTitle"><div class="cardhead"><h2 id="keyTitle">Groq Key</h2><button class="iconbtn close-settings" id="closeSettings" type="button" aria-label="Close settings">×</button></div><p>Saperli can use <code>GROQ_API_KEY</code> from Vercel when it is configured. If the server key is not set, enter your <a href="https://console.groq.com/keys" target="_blank" rel="noreferrer">Groq API Key</a> here; it stays in this browser and is sent only to the local <code>/api/chat</code> proxy.</p><input id="keyInput" type="password" placeholder="gsk_..." autocomplete="off" aria-label="Groq API key" /><div class="cardbtns"><button class="secondary" id="clearKey" type="button">Clear browser key</button><button class="primary" id="saveKey" type="button">Save key</button></div></div></div>
<script src="./app.js"></script>
</body>
</html>
