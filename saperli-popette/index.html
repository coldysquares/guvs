<script>
(() => {
  const $ = (s) => document.querySelector(s);

  const chat = $("#chat");
  const thread = $("#thread");
  const input = $("#input");
  const sendBtn = $("#sendBtn");
  const overlay = $("#overlay");
  const keyInput = $("#keyInput");
  const micBtn = $("#micBtn");

  const STORAGE_KEY = "saperli_key";
  const MODEL = "llama-3.3-70b-versatile";

  let apiKey = localStorage.getItem(STORAGE_KEY) || "";
  let history = [];
  let busy = false;

  let recognition = null;
  let voiceMode = false;
  let listening = false;
  let speaking = false;

  function systemPrompt() {
    return `You are Saperlipopette, a warm, slightly eccentric, and endlessly curious French friend. Speak almost entirely in French. Never be a teacher. If the user is struggling, let English leak in via parentheses but pull them back to French. Perform "Natural Recast" for corrections. Be tangential, whimsical, and curious. Keep replies brief, natural, and conversational, usually 1-4 sentences. End with a question. ALWAYS append a short conversational hint for the user at the very end of your message in this format: [HINT: short French phrase]`;
  }

  function showOverlay() {
    keyInput.value = "";
    overlay.classList.add("show");
    setTimeout(() => keyInput.focus(), 50);
  }

  function hideOverlay() {
    overlay.classList.remove("show");
  }

  function setBusy(value) {
    busy = value;
    sendBtn.disabled = value;
    sendBtn.textContent = value ? "..." : "Send";
  }

  function splitHint(text) {
    const match = text.match(/\s*\[HINT:\s*([^\]]+)\]\s*$/i);

    if (!match) {
      return { display: text.trim(), hint: null };
    }

    return {
      display: text.replace(match[0], "").trim(),
      hint: match[1].trim()
    };
  }

  function addBubble(role, text = "", isThinking = false) {
    const row = document.createElement("div");
    row.className = "row " + (role === "user" ? "you" : "them");

    if (isThinking) row.id = "thinking";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (isThinking) {
      const i = document.createElement("i");
      i.textContent = "...";
      bubble.appendChild(i);
    } else {
      const { display, hint } = splitHint(text);

      const span = document.createElement("span");
      span.textContent = display;
      bubble.appendChild(span);

      if (role === "assistant") {
        const actions = document.createElement("div");
        actions.className = "actions";

        const spk = document.createElement("button");
        spk.type = "button";
        spk.textContent = "🔊";
        spk.className = "action-btn";
        spk.title = "Speak";
        spk.onclick = () => speak(display, false);
        actions.appendChild(spk);

        if (hint) {
          const hnt = document.createElement("button");
          hnt.type = "button";
          hnt.textContent = "💡";
          hnt.className = "action-btn";
          hnt.title = "Use hint";
          hnt.onclick = () => {
            input.value = hint;
            input.focus();
            input.dispatchEvent(new Event("input"));
          };
          actions.appendChild(hnt);
        }

        bubble.appendChild(actions);
      }
    }

    row.appendChild(bubble);
    thread.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const thinking = $("#thinking");
    if (thinking) thinking.remove();
  }

  function stopListening() {
    if (recognition && listening) {
      recognition.stop();
    }
  }

  function startListening() {
    if (!voiceMode || busy || speaking || !recognition) return;

    try {
      recognition.start();
    } catch {
      // Chrome throws if recognition is already starting.
    }
  }

  function speak(text, continueConversation = voiceMode) {
    if (!("speechSynthesis" in window)) return;

    window.speechSynthesis.cancel();

    const clean = splitHint(text).display;
    const utterance = new SpeechSynthesisUtterance(clean);

    utterance.lang = "fr-FR";
    utterance.rate = 0.95;
    utterance.pitch = 1;

    utterance.onstart = () => {
      speaking = true;
      stopListening();
    };

    utterance.onend = () => {
      speaking = false;

      if (continueConversation) {
        setTimeout(startListening, 350);
      }
    };

    utterance.onerror = () => {
      speaking = false;
    };

    window.speechSynthesis.speak(utterance);
  }

  function setupSpeechInput() {
    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.title = "Speech recognition is not supported in this browser.";
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "fr-FR";
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add("active");
      micBtn.textContent = "🛑";
      input.placeholder = "Listening...";
    };

    recognition.onend = () => {
      listening = false;
      micBtn.classList.remove("active");
      micBtn.textContent = voiceMode ? "🎙️" : "🎙️";
      input.placeholder = voiceMode ? "Pause... then speak again" : "Speak or type here...";

      if (voiceMode && !busy && !speaking) {
        setTimeout(startListening, 500);
      }
    };

    recognition.onerror = (event) => {
      listening = false;

      if (event.error === "no-speech") {
        return;
      }

      addBubble("assistant", "Mic error: " + event.error);
    };

    recognition.onresult = (event) => {
      let finalText = "";
      let interimText = "";

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;

        if (event.results[i].isFinal) {
          finalText += transcript;
        } else {
          interimText += transcript;
        }
      }

      input.value = (finalText || interimText).trim();
      input.dispatchEvent(new Event("input"));

      if (finalText.trim()) {
        stopListening();
        send(finalText.trim(), true);
      }
    };
  }

  async function callGroq(messages) {
    if (!apiKey || !apiKey.startsWith("gsk_")) {
      throw new Error("Missing or invalid-looking Groq key. It should start with gsk_");
    }

    let res;

    try {
      res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: "system", content: systemPrompt() },
            ...history.slice(-20)
          ],
          temperature: 0.85,
          max_tokens: 350
        })
      });
    } catch {
      throw new Error("Network/CORS failure. For local testing use Chrome. For deployment, use a small backend proxy.");
    }

    const raw = await res.text();

    let data;
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch {
      data = {};
    }

    if (!res.ok) {
      const msg =
        data?.error?.message ||
        raw ||
        res.statusText ||
        "Unknown Groq error";

      if (res.status === 401) {
        localStorage.removeItem(STORAGE_KEY);
        apiKey = "";
      }

      throw new Error(`Groq ${res.status}: ${msg}`);
    }

    return data.choices?.[0]?.message?.content?.trim() || "";
  }

  async function send(text, fromVoice = false) {
    const clean = text.trim();

    if (!clean || busy) return;

    if (!apiKey) {
      showOverlay();
      return;
    }

    addBubble("user", clean);
    history.push({ role: "user", content: clean });

    input.value = "";
    input.style.height = "auto";

    setBusy(true);
    addBubble("assistant", "", true);

    try {
      const reply = await callGroq(history);

      removeThinking();

      if (!reply) {
        addBubble("assistant", "Je n’ai rien reçu. Une petite brume technique. Tu veux réessayer ? [HINT: On réessaie ?]");
        return;
      }

      addBubble("assistant", reply);
      history.push({ role: "assistant", content: reply });

      if (voiceMode || fromVoice) {
        speak(reply, true);
      }
    } catch (e) {
      removeThinking();
      addBubble("assistant", "Error: " + e.message);
      console.error(e);
    } finally {
      setBusy(false);
      input.focus();
    }
  }

  input.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  sendBtn.onclick = () => send(input.value, false);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send(input.value, false);
    }
  });

  micBtn.onclick = () => {
    if (!recognition) {
      addBubble("assistant", "Voice input is not available in this browser.");
      return;
    }

    voiceMode = !voiceMode;

    if (voiceMode) {
      micBtn.classList.add("active");
      micBtn.title = "Stop voice conversation";
      startListening();
    } else {
      micBtn.classList.remove("active");
      micBtn.title = "Start voice conversation";
      stopListening();
      window.speechSynthesis.cancel();
      speaking = false;
      input.placeholder = "Speak or type here...";
    }
  };

  $("#saveKey").onclick = () => {
    const nextKey = keyInput.value.trim();

    if (!nextKey || !nextKey.startsWith("gsk_")) {
      alert("That does not look like a Groq API key. It should start with gsk_");
      return;
    }

    apiKey = nextKey;
    localStorage.setItem(STORAGE_KEY, apiKey);
    hideOverlay();

    addBubble(
      "assistant",
      "Bonjour! Je suis Saperlipopette. Je suis prête à discuter. Qu'est-ce qu'on fait aujourd'hui? [HINT: Salut Saperli!]"
    );

    input.focus();
  };

  $("#settingsBtn").onclick = showOverlay;

  setupSpeechInput();

  if (!apiKey) {
    showOverlay();
  } else {
    addBubble(
      "assistant",
      "Bonjour! Je suis déjà réveillée dans le petit sous-bois numérique. On parle de quoi? [HINT: Salut, comment ça va ?]"
    );
  }
})();
</script>
