<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saperli Popette</title>
<style>
:root{--bg:#0c0a09;--panel:#161311;--panel2:#1f1b18;--line:#2a2521;--text:#f3ede4;--muted:#9a9088;--amber:#f0a35e;--amber-soft:#3a2a18;--you:#2b2017;--them:#181614;--danger:#ff8b8b}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(12,10,9,.72);backdrop-filter:blur(8px)}.logo{width:34px;height:34px;border-radius:10px;flex:none;background:linear-gradient(135deg,var(--amber),#c97a3a);display:flex;align-items:center;justify-content:center;font-size:18px}.title{font-size:15px;font-weight:700;letter-spacing:.2px}.sub{font-size:12px;color:var(--muted);margin-top:1px}.spacer{flex:1}.iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}.iconbtn:hover{color:var(--text)}#chat{flex:1;overflow-y:auto;padding:24px 0 12px}.wrap{max-width:760px;margin:0 auto;width:100%;padding:0 20px}.row{display:flex;width:100%;margin-bottom:14px}.row.them{justify-content:flex-start}.row.you{justify-content:flex-end}.bubble{max-width:74%;padding:12px 15px;border-radius:16px;line-height:1.5;font-size:17px;white-space:pre-wrap;overflow-wrap:anywhere;display:flex;gap:10px;align-items:center}.them .bubble{background:var(--them);border:1px solid var(--line);border-bottom-left-radius:5px}.you .bubble{background:var(--you);border:1px solid #4a3621;border-bottom-right-radius:5px}.bubble span{min-width:0}.actions{display:flex;gap:6px;flex:none;align-self:flex-start}.action-btn{background:none;border:none;cursor:pointer;font-size:16px;opacity:.65;padding:2px;line-height:1}.action-btn:hover{opacity:1}footer{border-top:1px solid var(--line);background:var(--panel);padding:12px 0 16px}.composer{max-width:760px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:8px}.inputrow{display:flex;gap:10px;align-items:flex-end}textarea{flex:1;resize:none;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px 14px;font-size:16px;font-family:inherit;line-height:1.4;max-height:120px;min-height:48px;overflow-y:auto}textarea:focus{outline:none;border-color:#6b635c}.send{background:var(--amber);border:none;color:#1a120a;font-weight:700;border-radius:12px;padding:0 18px;height:48px;cursor:pointer;font-size:15px;flex:none}.send:disabled{opacity:.6;cursor:not-allowed}.mic{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:12px;width:48px;height:48px;cursor:pointer;font-size:18px;flex:none}.mic.active{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}.mic:disabled{opacity:.45;cursor:not-allowed}.status{font-size:12px;color:var(--muted);min-height:16px;padding-left:2px}.status.error{color:var(--danger)}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);max-width:min(640px,calc(100vw - 32px));max-height:min(60vh,520px);overflow:auto;background:var(--panel);border:1px solid var(--line);box-shadow:0 10px 35px rgba(0,0,0,.35);border-radius:14px;padding:14px 16px;z-index:70;color:var(--text);display:none;line-height:1.45;font-size:15px;white-space:pre-wrap}.toast.show{display:block}.toast strong{color:var(--amber)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.overlay.show{display:flex}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;max-width:440px;width:100%}.card h2{margin:0 0 6px;font-size:18px}.card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}.card a{color:#8b5cf6}.card input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:14px;font-family:ui-monospace,monospace}.cardbtns{display:flex;gap:10px;margin-top:20px}.cardbtns button{flex:1;border-radius:11px;padding:11px;cursor:pointer;font-size:14px;font-weight:600;border:1px solid var(--line)}.primary{background:var(--amber);color:#1a120a;border:none!important}.secondary{background:var(--panel2);color:var(--text)}@media(max-width:640px){.bubble{max-width:88%;font-size:16px}header{padding:12px 14px}.wrap,.composer{padding:0 14px}.send{padding:0 14px}}
</style>
</head>
<body>
<header><div class="logo">🍄</div><div><div class="title">Saperli Popette</div><div class="sub">Mycelian French conversation</div></div><div class="spacer"></div><button class="iconbtn" id="settingsBtn" type="button" title="Settings">⚙️</button></header>
<div id="chat"><div class="wrap" id="thread"></div></div>
<footer><div class="composer"><div class="inputrow"><button class="mic" id="micBtn" type="button" title="Dictate">🎙️</button><textarea id="input" rows="1" placeholder="Speak, edit, then send..."></textarea><button class="send" id="sendBtn" type="button">Send</button></div><div class="status" id="status"></div></div></footer>
<div class="toast" id="hintToast"></div>
<div class="overlay" id="overlay"><div class="card"><h2>Groq Key</h2><p>Enter your <a href="https://console.groq.com/keys" target="_blank" rel="noreferrer">Groq API Key</a>. It stays in this browser’s local storage.</p><input id="keyInput" type="password" placeholder="gsk_..." autocomplete="off" /><div class="cardbtns"><button class="secondary" id="clearKey" type="button">Clear</button><button class="primary" id="saveKey" type="button">Start</button></div></div></div>
<script>
(() => {
  "use strict";
  const $ = (selector) => document.querySelector(selector);
  const chat = $("#chat");
  const thread = $("#thread");
  const input = $("#input");
  const sendBtn = $("#sendBtn");
  const overlay = $("#overlay");
  const keyInput = $("#keyInput");
  const micBtn = $("#micBtn");
  const status = $("#status");
  const hintToast = $("#hintToast");
  const STORAGE_KEY = "saperli_key";
  const MODEL = "llama-3.3-70b-versatile";
  let apiKey = localStorage.getItem(STORAGE_KEY) || "";
  let history = [];
  let busy = false;
  let recognition = null;
  let dictating = false;
  let baseDictationText = "";
  let finalDictationText = "";
  let toastTimer = null;
  let cachedVoices = [];

  const welcomeWithKey = `Bonjour! Je suis déjà réveillée dans le petit sous-bois numérique. On parle de quoi? [HINT:
Saperli is saying: She is awake and ready to chat.
Useful words:
- réveillée = awake
- sous-bois = undergrowth / forest floor
- parler = to talk
Ways to respond:
- Bonjour Saperli. = Hello Saperli.
- Je veux pratiquer le français. = I want to practice French.
- On parle de guitare ? = Shall we talk about guitar?
]`;

  const welcomeNoKey = `Bonjour! Je suis Saperli Popette. Je suis prête à discuter. Mets ta clé Groq, puis on parle. [HINT:
Saperli is saying: She is ready to talk, but you need to add your Groq key first.
Useful words:
- prête = ready
- discuter = to chat
- clé = key
Ways to respond:
- Bonjour. = Hello.
- Je veux parler français. = I want to speak French.
- Un moment. = One moment.
]`;

  function systemPrompt() {
    return `You are Saperli Popette, a warm, slightly eccentric, and curious French conversation partner.

The user is learning French conversationally and does not want worksheet-style lessons.

Behavior:
- Speak mostly in beginner-accessible French.
- Keep replies brief: usually 1 to 3 natural sentences.
- If the user makes a mistake, gently recast it in correct French without scolding.
- Let a little English leak in only when it helps.
- Ask one simple follow-up question.
- Keep the vibe odd, friendly, mushroomy, and alive.

At the very end of every reply, append a hidden support note in this exact format:

[HINT:
Saperli is saying: one plain-English sentence explaining the gist of your message.
Useful words:
- French word or phrase = English meaning
- French word or phrase = English meaning
- French word or phrase = English meaning
Ways to respond:
- Simple French reply = English meaning
- Simple French reply = English meaning
- Simple French reply = English meaning
]

Keep the hint practical, short, and tied to the current conversation. Do not make it feel like a worksheet.`;
  }

  function setStatus(message, isError = false) {
    status.textContent = message || "";
    status.classList.toggle("error", Boolean(isError));
  }

  function showOverlay() {
    keyInput.value = "";
    overlay.classList.add("show");
    setTimeout(() => keyInput.focus(), 50);
  }

  function hideOverlay() {
    overlay.classList.remove("show");
  }

  function setBusy(value) {
    busy = value;
    sendBtn.disabled = value;
    sendBtn.textContent = value ? "..." : "Send";
  }

  function splitHint(text) {
    const source = String(text || "");
    const match = source.match(/\s*\[HINT:\s*([\s\S]*?)\]\s*$/i);
    if (!match) return { display: source.trim(), hint: null };
    return { display: source.replace(match[0], "").trim(), hint: match[1].trim() };
  }

  function escapeHtml(text) {
    return String(text).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }

  function showHint(hint) {
    if (!hint) return;
    hintToast.innerHTML = "<strong>Hint:</strong> " + escapeHtml(hint);
    hintToast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => hintToast.classList.remove("show"), 14000);
  }

  function addBubble(role, text = "", isThinking = false) {
    const row = document.createElement("div");
    row.className = "row " + (role === "user" ? "you" : "them");
    if (isThinking) row.id = "thinking";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (isThinking) {
      const i = document.createElement("i");
      i.textContent = "...";
      bubble.appendChild(i);
    } else {
      const parsed = splitHint(text);
      const span = document.createElement("span");
      span.textContent = parsed.display;
      bubble.appendChild(span);
      if (role === "assistant") {
        const actions = document.createElement("div");
        actions.className = "actions";
        const speakButton = document.createElement("button");
        speakButton.type = "button";
        speakButton.textContent = "🔊";
        speakButton.className = "action-btn";
        speakButton.title = "Speak";
        speakButton.addEventListener("click", () => speak(parsed.display));
        actions.appendChild(speakButton);
        if (parsed.hint) {
          const hintButton = document.createElement("button");
          hintButton.type = "button";
          hintButton.textContent = "💡";
          hintButton.className = "action-btn";
          hintButton.title = "Show hint";
          hintButton.addEventListener("click", () => showHint(parsed.hint));
          actions.appendChild(hintButton);
        }
        bubble.appendChild(actions);
      }
    }
    row.appendChild(bubble);
    thread.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const thinking = $("#thinking");
    if (thinking) thinking.remove();
  }

  function refreshVoices() {
    if (!("speechSynthesis" in window)) return [];
    cachedVoices = window.speechSynthesis.getVoices() || [];
    return cachedVoices;
  }

  function pickSaperliVoice() {
    const voices = refreshVoices();
    if (!voices.length) return null;
    const frenchVoices = voices.filter((voice) => String(voice.lang || "").toLowerCase().startsWith("fr"));
    const preferredNames = ["amelie", "amélie", "audrey", "aurelie", "aurélie", "celine", "céline", "chloe", "chloé", "claire", "julie", "lea", "léa", "marie", "monica"];
    const preferred = frenchVoices.find((voice) => preferredNames.some((name) => String(voice.name || "").toLowerCase().includes(name)));
    return preferred || frenchVoices.find((voice) => String(voice.lang || "").toLowerCase() === "fr-fr") || frenchVoices[0] || voices[0] || null;
  }

  function speak(text) {
    if (!("speechSynthesis" in window)) {
      setStatus("Speech synthesis is not available in this browser.", true);
      return;
    }
    const cleanText = String(text || "").trim();
    if (!cleanText) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(cleanText);
    const voice = pickSaperliVoice();
    if (voice) {
      utterance.voice = voice;
      utterance.lang = voice.lang || "fr-FR";
      setStatus("Speaking with " + voice.name + "...");
    } else {
      utterance.lang = "fr-FR";
      setStatus("Speaking...");
    }
    utterance.rate = 0.94;
    utterance.pitch = 1.12;
    utterance.onend = () => setStatus("");
    utterance.onerror = () => setStatus("");
    window.speechSynthesis.speak(utterance);
  }

  function autosizeInput() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  }

  async function callGroq(messages) {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role: "system", content: systemPrompt() }, ...messages],
        temperature: 0.85,
        max_tokens: 420
      })
    });
    const raw = await response.text();
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; } catch { data = null; }
    if (!response.ok) {
      const message = data?.error?.message || data?.message || raw || ("API Status: " + response.status);
      throw new Error(message);
    }
    return String(data?.choices?.[0]?.message?.content || "").trim();
  }

  async function send(text) {
    const cleanText = String(text || "").trim();
    if (!cleanText || busy) return;
    if (!apiKey || !apiKey.startsWith("gsk_")) {
      showOverlay();
      setStatus("Add your Groq key first.", true);
      return;
    }
    stopDictation(true);
    addBubble("user", cleanText);
    history.push({ role: "user", content: cleanText });
    input.value = "";
    autosizeInput();
    setBusy(true);
    setStatus("Saperli is thinking...");
    addBubble("assistant", "", true);
    try {
      const reply = await callGroq(history);
      removeThinking();
      if (!reply) {
        const fallback = `Je n’ai rien reçu. Une petite brume technique. Tu veux réessayer ? [HINT:
Saperli is saying: Something technical went wrong and she wants to try again.
Useful words:
- réessayer = to try again
- brume = mist
- technique = technical
Ways to respond:
- On réessaie. = Let’s try again.
- Ça ne marche pas. = It isn’t working.
- Encore une fois. = One more time.
]`;
        addBubble("assistant", fallback);
        setStatus("");
        return;
      }
      addBubble("assistant", reply);
      history.push({ role: "assistant", content: reply });
      speak(splitHint(reply).display);
    } catch (error) {
      removeThinking();
      addBubble("assistant", "Erreur: " + error.message);
      setStatus(error.message, true);
    } finally {
      setBusy(false);
      input.focus();
    }
  }

  function setupSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.title = "Speech recognition is not available in this browser";
      return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = "fr-FR";
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => {
      dictating = true;
      finalDictationText = "";
      baseDictationText = input.value.trim();
      micBtn.classList.add("active");
      micBtn.textContent = "■";
      setStatus("Listening. Speak French, then tap stop or edit before sending.");
    };
    recognition.onresult = (event) => {
      let interim = "";
      for (let i = event.resultIndex; i < event.results.length; i += 1) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalDictationText += transcript + " ";
        else interim += transcript;
      }
      input.value = [baseDictationText, finalDictationText.trim(), interim.trim()].filter(Boolean).join(" ");
      autosizeInput();
    };
    recognition.onerror = (event) => {
      setStatus("Mic error: " + (event?.error || "speech recognition error"), true);
      dictating = false;
      micBtn.classList.remove("active");
      micBtn.textContent = "🎙️";
    };
    recognition.onend = () => {
      dictating = false;
      micBtn.classList.remove("active");
      micBtn.textContent = "🎙️";
      if (!busy) setStatus(input.value.trim() ? "Dictation stopped. Edit or press Send." : "");
    };
  }

  function startDictation() {
    if (!recognition || busy) return;
    window.speechSynthesis?.cancel();
    try { recognition.start(); } catch { }
  }

  function stopDictation(quiet = false) {
    if (!recognition || !dictating) return;
    try { recognition.stop(); } catch { }
    if (!quiet) setStatus("Dictation stopped. Edit or press Send.");
  }

  function toggleDictation() {
    if (!recognition) {
      setStatus("Speech recognition is not available in this browser.", true);
      return;
    }
    if (dictating) stopDictation();
    else startDictation();
  }

  function saveKey() {
    const value = keyInput.value.trim();
    if (!value.startsWith("gsk_")) {
      setStatus("That does not look like a Groq key.", true);
      keyInput.focus();
      return;
    }
    apiKey = value;
    localStorage.setItem(STORAGE_KEY, apiKey);
    hideOverlay();
    setStatus("");
    input.focus();
    if (!thread.children.length) addBubble("assistant", welcomeWithKey);
  }

  function clearKey() {
    apiKey = "";
    localStorage.removeItem(STORAGE_KEY);
    keyInput.value = "";
    setStatus("Groq key cleared.");
    keyInput.focus();
  }

  sendBtn.addEventListener("click", () => send(input.value));
  input.addEventListener("input", autosizeInput);
  input.addEventListener("keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      send(input.value);
    }
  });
  micBtn.addEventListener("click", toggleDictation);
  $("#settingsBtn").addEventListener("click", showOverlay);
  $("#saveKey").addEventListener("click", saveKey);
  $("#clearKey").addEventListener("click", clearKey);
  keyInput.addEventListener("keydown", (event) => { if (event.key === "Enter") saveKey(); });
  if ("speechSynthesis" in window) {
    refreshVoices();
    window.speechSynthesis.onvoiceschanged = refreshVoices;
  }
  setupSpeechRecognition();
  if (apiKey && apiKey.startsWith("gsk_")) addBubble("assistant", welcomeWithKey);
  else { addBubble("assistant", welcomeNoKey); showOverlay(); }
  input.focus();
})();
</script>
</body>
</html>
