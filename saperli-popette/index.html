<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saperli Popette</title>
<style>
  :root{
    --bg:#0c0a09; --panel:#161311; --panel2:#1f1b18; --line:#2a2521;
    --text:#f3ede4; --muted:#9a9088; --faint:#6b635c;
    --amber:#f0a35e; --amber-soft:#3a2a18; --you:#2b2017; --you-line:#4a3621;
    --them:#181614; --green:#7bd88f;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden;}
  header{display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line); background:rgba(12,10,9,.7); backdrop-filter:blur(8px);}
  .logo{width:34px;height:34px;border-radius:10px;flex:none;background:linear-gradient(135deg,var(--amber),#c97a3a);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .title{font-size:15px;font-weight:700;letter-spacing:.2px}
  .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .spacer{flex:1}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .iconbtn:hover{color:var(--text);border-color:var(--faint)}
  #chat{flex:1; overflow-y:auto; padding:24px 0 12px; display:flex;flex-direction:column;gap:14px;}
  .wrap{max-width:760px;margin:0 auto;width:100%;padding:0 20px}
  .row{display:flex;width:100%;margin-bottom:14px}
  .row.them{justify-content:flex-start}
  .row.you{justify-content:flex-end}
  .bubble{max-width:74%; padding:12px 15px; border-radius:16px; line-height:1.5; font-size:17px; position:relative; white-space:pre-wrap; word-wrap:break-word; display:flex; align-items:center;}
  .them .bubble{background:var(--them);border:1px solid var(--line);border-bottom-left-radius:5px}
  .you .bubble{background:var(--you);border:1px solid var(--you-line);border-bottom-right-radius:5px}
  .actions{display:flex; gap:6px; margin-left:10px; flex:none}
  .action-btn{background:none; border:none; cursor:pointer; font-size:16px; opacity:0.6; padding:2px;}
  .action-btn:hover{opacity:1}
  footer{border-top:1px solid var(--line);background:var(--panel);padding:12px 0 16px}
  .composer{max-width:760px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:8px}
  .inputrow{display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;resize:none;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:12px 14px;font-size:16px;font-family:inherit;line-height:1.4;max-height:120px;min-height:48px;overflow-y:auto;}
  textarea:focus{outline:none;border-color:var(--faint)}
  .send{background:var(--amber);border:none;color:#1a120a;font-weight:700;border-radius:12px;padding:0 18px;height:48px;cursor:pointer;font-size:15px;flex:none;}
  .send:disabled{opacity:.6;cursor:not-allowed}
  .mic{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:12px;width:48px;height:48px;cursor:pointer;font-size:18px;flex:none;}
  .mic:hover{border-color:var(--faint)}
  .mic.active{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
  .mic:disabled{opacity:.45;cursor:not-allowed}
  .status{font-size:12px;color:var(--muted);min-height:16px;padding-left:2px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay.show{display:flex}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;max-width:440px;width:100%;}
  .card h2{margin:0 0 6px;font-size:18px}
  .card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
  .card a{color:#8b5cf6}
  .card input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:14px;font-family:ui-monospace,monospace;}
  .cardbtns{display:flex;gap:10px;margin-top:20px}
  .cardbtns button{flex:1;border-radius:11px;padding:11px;cursor:pointer;font-size:14px;font-weight:600;border:1px solid var(--line)}
  .primary{background:var(--amber);color:#1a120a;border:none!important}
  @media (max-width:640px){
    .bubble{max-width:88%;font-size:16px}
    header{padding:12px 14px}
    .wrap,.composer{padding:0 14px}
    .send{padding:0 14px}
  }
</style>
</head>
<body>
  <header>
    <div class="logo">🍄</div>
    <div><div class="title">Saperli Popette</div><div class="sub">Mycelian French conversation</div></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="settingsBtn" type="button">⚙️</button>
  </header>

  <div id="chat"><div class="wrap" id="thread"></div></div>

  <footer>
    <div class="composer">
      <div class="inputrow">
        <button class="mic" id="micBtn" type="button" title="Start voice conversation">🎙️</button>
        <textarea id="input" rows="1" placeholder="Speak or type here..."></textarea>
        <button class="send" id="sendBtn" type="button">Send</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </footer>

  <div class="overlay" id="overlay">
    <div class="card">
      <h2>Groq Key</h2>
      <p>Enter your <a href="https://console.groq.com/keys" target="_blank" rel="noreferrer">Groq API Key</a>.</p>
      <input id="keyInput" type="password" placeholder="gsk_..." autocomplete="off" />
      <div class="cardbtns"><button class="primary" id="saveKey" type="button">Start</button></div>
    </div>
  </div>

<script>
(() => {
  const $ = (s) => document.querySelector(s);

  const chat = $("#chat");
  const thread = $("#thread");
  const input = $("#input");
  const sendBtn = $("#sendBtn");
  const overlay = $("#overlay");
  const keyInput = $("#keyInput");
  const micBtn = $("#micBtn");
  const status = $("#status");

  const STORAGE_KEY = "saperli_key";
  const MODEL = "llama-3.3-70b-versatile";

  let apiKey = localStorage.getItem(STORAGE_KEY) || "";
  let history = [];
  let busy = false;

  let recognition = null;
  let voiceMode = false;
  let listening = false;
  let speaking = false;
  let suppressNextRestart = false;

  function systemPrompt() {
    return `You are Saperlipopette, a warm, slightly eccentric, and endlessly curious French friend. Speak almost entirely in French. Never be a teacher. If the user is struggling, let English leak in via parentheses but pull them back to French. Perform "Natural Recast" for corrections. Be tangential, whimsical, and curious. Keep replies brief, natural, and conversational, usually 1-4 sentences. End with a question. ALWAYS append a short conversational hint for the user at the very end of your message in this format: [HINT: short French phrase]`;
  }

  function setStatus(text) {
    status.textContent = text || "";
  }

  function showOverlay() {
    keyInput.value = "";
    overlay.classList.add("show");
    setTimeout(() => keyInput.focus(), 50);
  }

  function hideOverlay() {
    overlay.classList.remove("show");
  }

  function setBusy(value) {
    busy = value;
    sendBtn.disabled = value;
    sendBtn.textContent = value ? "..." : "Send";
  }

  function splitHint(text) {
    const match = String(text || "").match(/\s*\[HINT:\s*([^\]]+)\]\s*$/i);

    if (!match) {
      return { display: String(text || "").trim(), hint: null };
    }

    return {
      display: String(text || "").replace(match[0], "").trim(),
      hint: match[1].trim()
    };
  }

  function addBubble(role, text = "", isThinking = false) {
    const row = document.createElement("div");
    row.className = "row " + (role === "user" ? "you" : "them");

    if (isThinking) row.id = "thinking";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (isThinking) {
      const i = document.createElement("i");
      i.textContent = "...";
      bubble.appendChild(i);
    } else {
      const { display, hint } = splitHint(text);

      const span = document.createElement("span");
      span.textContent = display;
      bubble.appendChild(span);

      if (role === "assistant") {
        const actions = document.createElement("div");
        actions.className = "actions";

        const spk = document.createElement("button");
        spk.type = "button";
        spk.textContent = "🔊";
        spk.className = "action-btn";
        spk.title = "Speak";
        spk.onclick = () => speak(display, false);
        actions.appendChild(spk);

        if (hint) {
          const hnt = document.createElement("button");
          hnt.type = "button";
          hnt.textContent = "💡";
          hnt.className = "action-btn";
          hnt.title = "Use hint";
          hnt.onclick = () => {
            input.value = hint;
            input.focus();
            input.dispatchEvent(new Event("input"));
          };
          actions.appendChild(hnt);
        }

        bubble.appendChild(actions);
      }
    }

    row.appendChild(bubble);
    thread.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const thinking = $("#thinking");
    if (thinking) thinking.remove();
  }

  function stopListening() {
    if (recognition && listening) {
      suppressNextRestart = true;
      recognition.stop();
    }
  }

  function startListening() {
    if (!voiceMode || busy || speaking || !recognition) return;

    try {
      suppressNextRestart = false;
      recognition.start();
    } catch {
      // Chrome throws if recognition is already starting.
    }
  }

  function speak(text, continueConversation = voiceMode) {
    if (!("speechSynthesis" in window)) {
      setStatus("Speech output is not supported in this browser.");
      return;
    }

    window.speechSynthesis.cancel();

    const clean = splitHint(text).display;
    const utterance = new SpeechSynthesisUtterance(clean);

    utterance.lang = "fr-FR";
    utterance.rate = 0.95;
    utterance.pitch = 1;

    utterance.onstart = () => {
      speaking = true;
      stopListening();
      setStatus("Saperli is speaking...");
    };

    utterance.onend = () => {
      speaking = false;
      setStatus(continueConversation ? "Listening will resume..." : "");

      if (continueConversation) {
        setTimeout(startListening, 450);
      }
    };

    utterance.onerror = () => {
      speaking = false;
      setStatus("");
    };

    window.speechSynthesis.speak(utterance);
  }

  function setupSpeechInput() {
    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.title = "Speech recognition is not supported in this browser.";
      setStatus("Voice input is not supported here. Try Chrome.");
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "fr-FR";
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add("active");
      micBtn.textContent = "🛑";
      input.placeholder = "Listening...";
      setStatus("Listening...");
    };

    recognition.onend = () => {
      listening = false;

      if (!voiceMode) {
        micBtn.classList.remove("active");
        micBtn.textContent = "🎙️";
        micBtn.title = "Start voice conversation";
        input.placeholder = "Speak or type here...";
        setStatus("");
        return;
      }

      micBtn.classList.add("active");
      micBtn.textContent = "🎙️";
      micBtn.title = "Stop voice conversation";
      input.placeholder = "Pause... then speak again";

      if (suppressNextRestart) {
        suppressNextRestart = false;
        return;
      }

      if (voiceMode && !busy && !speaking) {
        setTimeout(startListening, 500);
      }
    };

    recognition.onerror = (event) => {
      listening = false;

      if (event.error === "no-speech") {
        setStatus("No speech heard. Listening again...");
        return;
      }

      if (event.error === "not-allowed" || event.error === "service-not-allowed") {
        voiceMode = false;
        micBtn.classList.remove("active");
        micBtn.textContent = "🎙️";
        setStatus("Microphone permission was blocked.");
        addBubble("assistant", "Mic permission was blocked. Allow microphone access in your browser, then try again.");
        return;
      }

      setStatus("Mic error: " + event.error);
      addBubble("assistant", "Mic error: " + event.error);
    };

    recognition.onresult = (event) => {
      let finalText = "";
      let interimText = "";

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;

        if (event.results[i].isFinal) {
          finalText += transcript;
        } else {
          interimText += transcript;
        }
      }

      input.value = (finalText || interimText).trim();
      input.dispatchEvent(new Event("input"));

      if (finalText.trim()) {
        stopListening();
        send(finalText.trim(), true);
      }
    };
  }

  async function callGroq() {
    if (!apiKey || !apiKey.startsWith("gsk_")) {
      throw new Error("Missing or invalid-looking Groq key. It should start with gsk_");
    }

    let res;

    try {
      res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: "system", content: systemPrompt() },
            ...history.slice(-20)
          ],
          temperature: 0.85,
          max_tokens: 350
        })
      });
    } catch {
      throw new Error("Network/CORS failure. For local testing use Chrome. For deployment, use a small backend proxy if the browser blocks requests.");
    }

    const raw = await res.text();

    let data;
    try {
      data = raw ? JSON.parse(raw) : {};
    } catch {
      data = {};
    }

    if (!res.ok) {
      const msg =
        data?.error?.message ||
        raw ||
        res.statusText ||
        "Unknown Groq error";

      if (res.status === 401) {
        localStorage.removeItem(STORAGE_KEY);
        apiKey = "";
      }

      throw new Error(`Groq ${res.status}: ${msg}`);
    }

    return data.choices?.[0]?.message?.content?.trim() || "";
  }

  async function send(text, fromVoice = false) {
    const clean = String(text || "").trim();

    if (!clean || busy) return;

    if (!apiKey) {
      showOverlay();
      return;
    }

    addBubble("user", clean);
    history.push({ role: "user", content: clean });

    input.value = "";
    input.style.height = "auto";

    setBusy(true);
    setStatus("Thinking...");
    addBubble("assistant", "", true);

    try {
      const reply = await callGroq();

      removeThinking();

      if (!reply) {
        addBubble("assistant", "Je n’ai rien reçu. Une petite brume technique. Tu veux réessayer ? [HINT: On réessaie ?]");
        setStatus("");
        return;
      }

      addBubble("assistant", reply);
      history.push({ role: "assistant", content: reply });

      if (voiceMode || fromVoice) {
        speak(reply, true);
      } else {
        setStatus("");
      }
    } catch (e) {
      removeThinking();
      addBubble("assistant", "Error: " + e.message);
      console.error(e);
      setStatus("");
    } finally {
      setBusy(false);
      input.focus();
    }
  }

  input.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  sendBtn.onclick = () => send(input.value, false);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send(input.value, false);
    }
  });

  micBtn.onclick = () => {
    if (!recognition) {
      addBubble("assistant", "Voice input is not available in this browser. Try Chrome.");
      return;
    }

    voiceMode = !voiceMode;

    if (voiceMode) {
      micBtn.classList.add("active");
      micBtn.textContent = "🎙️";
      micBtn.title = "Stop voice conversation";
      setStatus("Voice conversation on. Start speaking...");
      startListening();
    } else {
      micBtn.classList.remove("active");
      micBtn.textContent = "🎙️";
      micBtn.title = "Start voice conversation";
      stopListening();
      window.speechSynthesis.cancel();
      speaking = false;
      setStatus("");
      input.placeholder = "Speak or type here...";
    }
  };

  $("#saveKey").onclick = () => {
    const nextKey = keyInput.value.trim();

    if (!nextKey || !nextKey.startsWith("gsk_")) {
      alert("That does not look like a Groq API key. It should start with gsk_");
      return;
    }

    apiKey = nextKey;
    localStorage.setItem(STORAGE_KEY, apiKey);
    hideOverlay();

    addBubble(
      "assistant",
      "Bonjour! Je suis Saperlipopette. Je suis prête à discuter. Qu'est-ce qu'on fait aujourd'hui? [HINT: Salut Saperli!]"
    );

    input.focus();
  };

  keyInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      $("#saveKey").click();
    }
  });

  $("#settingsBtn").onclick = showOverlay;

  setupSpeechInput();

  if (!apiKey) {
    showOverlay();
  } else {
    addBubble(
      "assistant",
      "Bonjour! Je suis déjà réveillée dans le petit sous-bois numérique. On parle de quoi? [HINT: Salut, comment ça va ?]"
    );
  }
})();
</script>
</body>
</html>
